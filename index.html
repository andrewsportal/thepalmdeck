<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palm Deck House</title>
  <meta
    name="description"
    content="A minimal Apple-inspired portal for three House mixtapes with cinematic looping visuals and lightweight background playback."
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#111111",
            surface: "#1C1C1E",
            cream: "#FFF8F0",
            coral: "#E85D04",
            gold: "#FFB703",
          },
        },
      },
    };
  </script>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      color: #fff8f0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .portal-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      transition: opacity 420ms ease;
    }

    .portal-video.video-dim {
      opacity: 0.4;
    }

    .ambient-mask {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 183, 3, 0.16), transparent 42%),
        linear-gradient(to bottom, rgba(17, 17, 17, 0.26), rgba(17, 17, 17, 0.84));
    }

    .controls-overlay {
      opacity: 1;
      transition: opacity 320ms ease;
      pointer-events: none;
    }

    .controls-overlay.is-hidden {
      opacity: 0;
    }

    .controls-overlay .ui-hit {
      pointer-events: auto;
    }

    .controls-overlay.is-hidden .ui-hit {
      pointer-events: none;
    }

    .glass {
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      background: rgba(24, 24, 26, 0.58);
      border: 1px solid rgba(255, 248, 240, 0.11);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
    }

    .gloss-btn {
      border: 1px solid rgba(255, 248, 240, 0.22);
      background: linear-gradient(to bottom, rgba(255, 248, 240, 0.16), rgba(255, 248, 240, 0.06));
      color: #fff8f0;
      cursor: pointer;
      transition:
        transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 200ms ease,
        background 200ms ease;
    }

    .gloss-btn:hover {
      transform: scale(1.05);
      border-color: rgba(255, 248, 240, 0.36);
    }

    .gloss-btn:active { transform: scale(0.95); }

    .mix-chip {
      border-radius: 0.9rem;
      border: 1px solid rgba(255, 248, 240, 0.14);
      background: rgba(255, 248, 240, 0.05);
      transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1), background 220ms ease, border-color 220ms ease;
    }

    .mix-chip:hover {
      transform: translateY(-2px);
      background: rgba(255, 248, 240, 0.1);
    }

    .mix-chip.active {
      border-color: rgba(255, 183, 3, 0.62);
      background: rgba(255, 183, 3, 0.16);
      box-shadow: 0 0 0 1px rgba(255, 183, 3, 0.3);
    }

    .plaque-shell {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.8rem;
      padding: 2px;
      background: linear-gradient(145deg, rgba(255, 183, 3, 0.95), rgba(232, 93, 4, 0.62));
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.36);
      flex-shrink: 0;
    }

    .plaque-core {
      width: 100%;
      height: 100%;
      border-radius: 0.7rem;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 220, 132, 0.95), rgba(182, 124, 32, 0.92) 48%, rgba(84, 50, 12, 0.96) 100%);
    }

    .plaque-core::before {
      content: "";
      position: absolute;
      inset: 20%;
      border-radius: 999px;
      border: 1px solid rgba(255, 248, 240, 0.45);
      pointer-events: none;
    }

    .plaque-core img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    .mix-animated-next {
      animation: mixInNext 360ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .mix-animated-prev {
      animation: mixInPrev 360ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes mixInNext {
      from { opacity: 0; transform: translateX(18px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes mixInPrev {
      from { opacity: 0; transform: translateX(-18px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      position: relative;
      background: rgba(255, 248, 240, 0.2);
      cursor: pointer;
      transition: height 180ms ease;
    }

    .progress:hover,
    .progress:focus-visible {
      height: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      width: 0%;
      background: linear-gradient(90deg, #e85d04, #ffb703);
    }

    .progress-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%) scale(0);
      background: #fff8f0;
      transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .progress:hover .progress-thumb,
    .progress:focus-visible .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .tracklist-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 340ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .tracklist-panel.open {
      max-height: min(30svh, 290px);
    }

    .tracklist-scroll {
      max-height: min(24svh, 230px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 248, 240, 0.2) transparent;
    }

    .tracklist-scroll::-webkit-scrollbar { width: 8px; }
    .tracklist-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 248, 240, 0.2);
      border-radius: 999px;
    }

    .tabular { font-variant-numeric: tabular-nums; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <video
    id="portalVideo"
    class="portal-video"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    poster="hero-poster.jpg"
    aria-hidden="true"
  >
    <source id="portalVideoSource" src="sunset-dance-loop.mp4" type="video/mp4" />
  </video>
  <div class="ambient-mask" aria-hidden="true"></div>

  <main id="stage" class="relative h-[100svh] w-full overflow-hidden">
    <div id="gestureSurface" class="absolute inset-0 z-10"></div>

    <div id="controlsOverlay" class="controls-overlay absolute inset-0 z-20 flex flex-col justify-between p-4 md:p-6">
      <header class="ui-hit text-center">
        <p id="creditTop" class="text-[0.64rem] uppercase tracking-[0.24em] text-gold/85">Mixed by Andrew</p>
        <h1 id="headline" class="mt-2 text-[clamp(2.1rem,8vw,4.5rem)] font-semibold leading-[0.95] tracking-[-0.03em] text-cream">
          Palm Deck House
        </h1>
        <p id="subheadline" class="mx-auto mt-2 max-w-[36ch] text-[0.92rem] leading-relaxed text-cream/72 md:text-[1rem]">
          A portal into the deck: palms, horizon, warm air, and three uninterrupted House journeys.
        </p>
      </header>

      <section class="ui-hit mx-0 mb-0 rounded-3xl p-3 glass md:mx-auto md:mb-1 md:w-full md:max-w-5xl md:p-4" aria-label="Mixtape controls">
        <div id="mixSelector" class="grid grid-cols-3 gap-2"></div>

        <div id="mixMeta" class="mt-3 mix-animated-next">
          <div class="flex items-center justify-between gap-3">
            <div class="flex min-w-0 items-center gap-3">
              <div class="plaque-shell h-[3.05rem] w-[3.05rem] rounded-xl">
                <div class="plaque-core rounded-[0.72rem]">
                  <img id="playerArtwork" src="artwork-1.png" alt="" />
                </div>
              </div>
              <div class="min-w-0">
                <p id="mixTitle" class="truncate text-[0.93rem] font-medium tracking-[-0.01em] text-cream"></p>
                <p id="mixMood" class="truncate text-[0.74rem] text-cream/62"></p>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <button
                id="prevMixBtn"
                type="button"
                class="gloss-btn inline-flex h-10 w-10 items-center justify-center rounded-full"
                aria-label="Previous mixtape"
              >
                <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
                  <path d="M15 6l-6 6 6 6"></path>
                </svg>
              </button>
              <button
                id="nextMixBtn"
                type="button"
                class="gloss-btn inline-flex h-10 w-10 items-center justify-center rounded-full"
                aria-label="Next mixtape"
              >
                <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
                  <path d="M9 6l6 6-6 6"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="mt-3 grid grid-cols-[auto_auto_auto_auto_auto] items-center justify-center gap-2">
          <button
            id="rewindBtn"
            type="button"
            class="gloss-btn inline-flex h-10 w-10 items-center justify-center rounded-full"
            aria-label="Rewind 10 seconds"
          >
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M11 19a7 7 0 1 1 5.57-11.24"></path>
              <path d="M12 8H8v4"></path>
              <path d="M8 8l5 5"></path>
            </svg>
          </button>

          <button
            id="playPauseBtn"
            type="button"
            class="gloss-btn inline-flex h-11 w-11 items-center justify-center rounded-full border-gold/45 bg-gradient-to-b from-gold/35 to-coral/25"
            aria-label="Play"
          >
            <svg id="iconPlay" viewBox="0 0 24 24" class="h-[18px] w-[18px] translate-x-[1px]" fill="#fff8f0" aria-hidden="true">
              <path d="M8 5v14l11-7z"></path>
            </svg>
            <svg id="iconPause" viewBox="0 0 24 24" class="hidden h-[18px] w-[18px]" fill="#fff8f0" aria-hidden="true">
              <path d="M7 5h4v14H7zm6 0h4v14h-4z"></path>
            </svg>
          </button>

          <button
            id="forwardBtn"
            type="button"
            class="gloss-btn inline-flex h-10 w-10 items-center justify-center rounded-full"
            aria-label="Forward 10 seconds"
          >
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M13 19a7 7 0 1 0-5.57-11.24"></path>
              <path d="M12 8h4v4"></path>
              <path d="M16 8l-5 5"></path>
            </svg>
          </button>

          <button
            id="toggleTracklistBtn"
            type="button"
            class="gloss-btn inline-flex h-10 items-center justify-center rounded-full px-3 text-[0.62rem] font-medium uppercase tracking-[0.14em]"
            aria-label="Toggle tracklist"
            aria-expanded="false"
          >
            Tracklist
          </button>

          <button
            id="muteBtn"
            type="button"
            class="gloss-btn inline-flex h-10 w-10 items-center justify-center rounded-full"
            aria-label="Mute"
          >
            <svg id="iconVol" viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9z"></path>
              <path d="M18.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M20.8 6.1a8.6 8.6 0 0 1 0 11.8"></path>
            </svg>
            <svg id="iconMuted" viewBox="0 0 24 24" class="hidden h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9z"></path>
              <path d="M19 9l-4 6"></path>
              <path d="M15 9l4 6"></path>
            </svg>
          </button>
        </div>

        <div class="mt-3 grid grid-cols-[auto_1fr_auto] items-center gap-2">
          <span id="timeEl" class="tabular text-[0.68rem] text-cream/58">0:00</span>
          <div
            id="progressTrack"
            class="progress"
            role="slider"
            tabindex="0"
            aria-label="Playback progress"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressThumb" class="progress-thumb"></div>
          </div>
          <span id="durationEl" class="tabular text-[0.68rem] text-cream/58">0:00</span>
        </div>

        <div id="tracklistPanel" class="tracklist-panel mt-3 rounded-2xl border border-cream/12 bg-black/25 p-3">
          <div id="mixDownloads" class="mb-2 flex flex-wrap gap-1.5"></div>
          <ol id="tracklistList" class="tracklist-scroll space-y-1 text-[0.76rem] leading-relaxed text-cream/78"></ol>
        </div>

        <p id="creditBottom" class="mt-3 text-center text-[0.64rem] uppercase tracking-[0.16em] text-cream/42">
          Mixed and curated by Andrew
        </p>
      </section>
    </div>
  </main>

  <script>
    // -------------------------------------------------------------
    // PORTAL DATA (single source of truth)
    // -------------------------------------------------------------
    // 1) Update branding + credits in PORTAL.site
    // 2) Update looping video in PORTAL.video
    // 3) Update each mix in PORTAL.mixtapes (audio/download/artwork/tracklist)
    const PORTAL = {
      site: {
        title: "Palm Deck House",
        creditTop: "Mixed by Andrew",
        headline: "Palm Deck House",
        subheadline: "A portal into the deck: palms, horizon, warm air, and three uninterrupted House journeys.",
        creditBottom: "Mixed and curated by Andrew",
      },
      video: {
        src: "sunset-dance-loop.mp4",
        poster: "hero-poster.jpg",
      },
      mixtapes: [
        {
          id: "mixtape1",
          title: "Mixtape 1",
          mood: "Golden sunset movement",
          audio: "mixtape1.mp3",
          download: "mixtape1.mp3",
          artwork: "artwork-1.png",
          video: "sunset-dance-loop.mp4",
          tracklist: [
            "01. Artist - Opening Horizon",
            "02. Artist - Palm Rhythm",
            "03. Artist - Warm Current",
            "04. Artist - Coastal Groove",
          ],
        },
        {
          id: "mixtape2",
          title: "Mixtape 2",
          mood: "Deck lounge as dusk deepens",
          audio: "mixtape2.mp3",
          download: "mixtape2.mp3",
          artwork: "artwork-2.png",
          video: "sunset-dance-loop.mp4",
          tracklist: [
            "01. Artist - Blue Lanterns",
            "02. Artist - Deck Conversations",
            "03. Artist - Salt Air",
            "04. Artist - Night Bloom",
          ],
        },
        {
          id: "mixtape3",
          title: "Mixtape 3",
          mood: "Afterglow into night",
          audio: "mixtape3.mp3",
          download: "mixtape3.mp3",
          artwork: "artwork-3.png",
          video: "sunset-dance-loop.mp4",
          tracklist: [
            "01. Artist - Midnight Palms",
            "02. Artist - Quiet Movement",
            "03. Artist - Sea of Lights",
            "04. Artist - Closing Embrace",
          ],
        },
      ],
    };

    const audio = new Audio();
    audio.preload = "metadata";

    let activeMixIndex = 0;
    let isPlaying = false;
    let isScrubbing = false;
    let controlsVisible = true;
    let autoHideTimer = null;
    let tracklistOpen = false;
    let lastDirection = "next";

    const portalVideo = document.getElementById("portalVideo");
    const portalVideoSource = document.getElementById("portalVideoSource");
    const stage = document.getElementById("stage");
    const gestureSurface = document.getElementById("gestureSurface");
    const controlsOverlay = document.getElementById("controlsOverlay");
    const creditTop = document.getElementById("creditTop");
    const headline = document.getElementById("headline");
    const subheadline = document.getElementById("subheadline");
    const mixSelector = document.getElementById("mixSelector");
    const mixMeta = document.getElementById("mixMeta");
    const playerArtwork = document.getElementById("playerArtwork");
    const mixTitle = document.getElementById("mixTitle");
    const mixMood = document.getElementById("mixMood");
    const prevMixBtn = document.getElementById("prevMixBtn");
    const nextMixBtn = document.getElementById("nextMixBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const iconPlay = document.getElementById("iconPlay");
    const iconPause = document.getElementById("iconPause");
    const rewindBtn = document.getElementById("rewindBtn");
    const forwardBtn = document.getElementById("forwardBtn");
    const toggleTracklistBtn = document.getElementById("toggleTracklistBtn");
    const muteBtn = document.getElementById("muteBtn");
    const iconVol = document.getElementById("iconVol");
    const iconMuted = document.getElementById("iconMuted");
    const progressTrack = document.getElementById("progressTrack");
    const progressFill = document.getElementById("progressFill");
    const progressThumb = document.getElementById("progressThumb");
    const timeEl = document.getElementById("timeEl");
    const durationEl = document.getElementById("durationEl");
    const tracklistPanel = document.getElementById("tracklistPanel");
    const mixDownloads = document.getElementById("mixDownloads");
    const tracklistList = document.getElementById("tracklistList");
    const creditBottom = document.getElementById("creditBottom");

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function clearAutoHide() {
      if (!autoHideTimer) return;
      window.clearTimeout(autoHideTimer);
      autoHideTimer = null;
    }

    function setControlsVisible(visible) {
      controlsVisible = visible;
      controlsOverlay.classList.toggle("is-hidden", !visible);
    }

    function scheduleAutoHide() {
      clearAutoHide();
      if (!isPlaying) return;
      autoHideTimer = window.setTimeout(() => {
        setControlsVisible(false);
      }, 1800);
    }

    function revealControls() {
      setControlsVisible(true);
      scheduleAutoHide();
    }

    function setTracklistOpen(open) {
      tracklistOpen = open;
      tracklistPanel.classList.toggle("open", open);
      toggleTracklistBtn.setAttribute("aria-expanded", String(open));
      toggleTracklistBtn.textContent = open ? "Hide List" : "Tracklist";
      if (open) revealControls();
    }

    function setPlayState(playing) {
      isPlaying = playing;
      iconPlay.classList.toggle("hidden", playing);
      iconPause.classList.toggle("hidden", !playing);
      playPauseBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
      if (playing) {
        scheduleAutoHide();
      } else {
        clearAutoHide();
        setControlsVisible(true);
      }
      updateMediaSession(PORTAL.mixtapes[activeMixIndex]);
    }

    function updateMuteUI() {
      const muted = audio.muted;
      iconVol.classList.toggle("hidden", muted);
      iconMuted.classList.toggle("hidden", !muted);
      muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
    }

    function updateProgressUI() {
      const duration = audio.duration;
      const now = audio.currentTime;
      if (!Number.isFinite(duration) || duration <= 0) {
        progressFill.style.width = "0%";
        progressThumb.style.left = "0%";
        progressTrack.setAttribute("aria-valuenow", "0");
        progressTrack.setAttribute("aria-valuetext", "0:00 of 0:00");
        timeEl.textContent = "0:00";
        durationEl.textContent = "0:00";
        return;
      }

      const pct = Math.min(100, Math.max(0, (now / duration) * 100));
      progressFill.style.width = `${pct}%`;
      progressThumb.style.left = `${pct}%`;
      progressTrack.setAttribute("aria-valuenow", String(Math.round(pct)));
      progressTrack.setAttribute("aria-valuetext", `${formatTime(now)} of ${formatTime(duration)}`);
      timeEl.textContent = formatTime(now);
      durationEl.textContent = formatTime(duration);
    }

    function seekByClientX(clientX) {
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
      const rect = progressTrack.getBoundingClientRect();
      const x = Math.min(Math.max(clientX - rect.left, 0), rect.width);
      audio.currentTime = (x / rect.width) * audio.duration;
      updateProgressUI();
    }

    function updateVideoSource(mixtape) {
      const nextVideo = mixtape.video || PORTAL.video.src;
      if (portalVideoSource.getAttribute("src") === nextVideo) return;
      portalVideo.classList.add("video-dim");
      window.setTimeout(() => {
        portalVideoSource.setAttribute("src", nextVideo);
        portalVideo.load();
        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          portalVideo.play().catch(() => {});
        }
        portalVideo.classList.remove("video-dim");
      }, 140);
    }

    function updateMediaSession(mixtape) {
      if (!("mediaSession" in navigator) || !mixtape) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: mixtape.title,
        artist: PORTAL.site.creditTop,
        album: PORTAL.site.title,
        artwork: [{ src: mixtape.artwork, sizes: "512x512", type: "image/png" }],
      });
      navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
    }

    function animateMixMeta(direction) {
      mixMeta.classList.remove("mix-animated-next", "mix-animated-prev");
      // Force reflow to restart CSS animation cleanly.
      void mixMeta.offsetWidth;
      mixMeta.classList.add(direction === "prev" ? "mix-animated-prev" : "mix-animated-next");
    }

    function renderSelector() {
      mixSelector.innerHTML = "";
      PORTAL.mixtapes.forEach((mixtape, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "mix-chip ui-hit flex items-center gap-2 px-2 py-2 text-left";
        button.setAttribute("aria-label", `Play ${mixtape.title}`);
        button.dataset.index = String(index);
        button.innerHTML = `
          <span class="plaque-shell">
            <span class="plaque-core">
              <img src="${mixtape.artwork}" alt="${mixtape.title} artwork" loading="lazy" />
            </span>
          </span>
          <span class="min-w-0">
            <span class="block truncate text-[0.68rem] font-medium uppercase tracking-[0.09em] text-cream">${mixtape.title}</span>
            <span class="block truncate text-[0.63rem] text-cream/55">${mixtape.id}</span>
          </span>
        `;
        button.addEventListener("click", () => {
          const direction = index > activeMixIndex ? "next" : "prev";
          selectMixtape(index, { autoplay: true, direction });
        });
        mixSelector.appendChild(button);
      });
    }

    function renderSelectorState() {
      mixSelector.querySelectorAll(".mix-chip").forEach((chip, index) => {
        chip.classList.toggle("active", index === activeMixIndex);
      });
    }

    function renderDownloads() {
      mixDownloads.innerHTML = "";
      PORTAL.mixtapes.forEach((mixtape) => {
        const link = document.createElement("a");
        link.href = mixtape.download || mixtape.audio;
        link.download = (mixtape.download || mixtape.audio).split("/").pop();
        link.className = "gloss-btn inline-flex h-8 items-center justify-center rounded-full px-3 text-[0.58rem] font-medium uppercase tracking-[0.12em] text-cream no-underline";
        link.setAttribute("aria-label", `Download ${mixtape.title}`);
        link.textContent = `Download ${mixtape.id}`;
        mixDownloads.appendChild(link);
      });
    }

    function renderTracklist(tracklist) {
      tracklistList.innerHTML = "";
      tracklist.forEach((track) => {
        const li = document.createElement("li");
        li.className = "rounded-lg bg-cream/[0.04] px-2 py-1.5";
        li.textContent = track;
        tracklistList.appendChild(li);
      });
    }

    async function playAudio() {
      try {
        await audio.play();
        setPlayState(true);
      } catch (_error) {
        setPlayState(false);
      }
    }

    function togglePlayPause() {
      if (audio.paused) {
        playAudio();
      } else {
        audio.pause();
      }
    }

    function normalizeMixIndex(index) {
      const len = PORTAL.mixtapes.length;
      if (!len) return 0;
      return ((index % len) + len) % len;
    }

    function selectMixtape(index, options = {}) {
      const {
        autoplay = true,
        direction = "next",
      } = options;
      const nextIndex = normalizeMixIndex(index);
      const mixtape = PORTAL.mixtapes[nextIndex];
      if (!mixtape) return;

      activeMixIndex = nextIndex;
      lastDirection = direction;
      mixTitle.textContent = mixtape.title;
      mixMood.textContent = mixtape.mood;
      playerArtwork.src = mixtape.artwork;
      playerArtwork.alt = `${mixtape.title} artwork`;
      renderTracklist(mixtape.tracklist);
      renderSelectorState();
      animateMixMeta(direction);
      updateVideoSource(mixtape);

      audio.src = mixtape.audio;
      audio.currentTime = 0;
      audio.load();
      updateProgressUI();
      updateMediaSession(mixtape);

      if (autoplay) {
        playAudio();
      } else {
        setPlayState(false);
      }
      revealControls();
    }

    function bindEvents() {
      gestureSurface.addEventListener("pointerdown", () => {
        if (!controlsVisible) {
          revealControls();
        } else if (isPlaying && !tracklistOpen) {
          // Second tap while visible + playing quickly hides overlay.
          setControlsVisible(false);
          clearAutoHide();
        } else {
          revealControls();
        }
      });

      stage.addEventListener("pointermove", () => {
        if (!controlsVisible && isPlaying) return;
        if (isPlaying) scheduleAutoHide();
      });

      playPauseBtn.addEventListener("click", () => {
        togglePlayPause();
        revealControls();
      });

      rewindBtn.addEventListener("click", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
        revealControls();
      });

      forwardBtn.addEventListener("click", () => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
        revealControls();
      });

      prevMixBtn.addEventListener("click", () => {
        selectMixtape(activeMixIndex - 1, { autoplay: true, direction: "prev" });
      });

      nextMixBtn.addEventListener("click", () => {
        selectMixtape(activeMixIndex + 1, { autoplay: true, direction: "next" });
      });

      toggleTracklistBtn.addEventListener("click", () => {
        setTracklistOpen(!tracklistOpen);
      });

      muteBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        updateMuteUI();
        revealControls();
      });

      progressTrack.addEventListener("pointerdown", (event) => {
        isScrubbing = true;
        seekByClientX(event.clientX);
        progressTrack.setPointerCapture(event.pointerId);
      });

      progressTrack.addEventListener("pointermove", (event) => {
        if (!isScrubbing) return;
        seekByClientX(event.clientX);
      });

      progressTrack.addEventListener("pointerup", () => {
        isScrubbing = false;
      });

      progressTrack.addEventListener("keydown", (event) => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        const step = Math.max(1, audio.duration * 0.02);
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          audio.currentTime = Math.max(0, audio.currentTime - step);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          audio.currentTime = Math.min(audio.duration, audio.currentTime + step);
        } else if (event.key === "Home") {
          event.preventDefault();
          audio.currentTime = 0;
        } else if (event.key === "End") {
          event.preventDefault();
          audio.currentTime = audio.duration;
        }
        updateProgressUI();
      });

      audio.addEventListener("loadedmetadata", updateProgressUI);
      audio.addEventListener("timeupdate", updateProgressUI);
      audio.addEventListener("play", () => setPlayState(true));
      audio.addEventListener("pause", () => setPlayState(false));
      audio.addEventListener("ended", () => setPlayState(false));

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          // Keep audio alive, pause video decode for lower memory usage.
          portalVideo.pause();
        } else if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          portalVideo.play().catch(() => {});
        }
      });

      document.addEventListener("keydown", (event) => {
        const inInput = event.target.closest("input, textarea, select, [contenteditable], button, a");
        if (inInput) return;
        if (event.key === " ") {
          event.preventDefault();
          togglePlayPause();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          audio.muted = !audio.muted;
          updateMuteUI();
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          audio.currentTime = Math.max(0, audio.currentTime - 10);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          if (Number.isFinite(audio.duration)) {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
          }
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          selectMixtape(activeMixIndex - 1, { autoplay: true, direction: "prev" });
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          selectMixtape(activeMixIndex + 1, { autoplay: true, direction: "next" });
        } else if (event.key.toLowerCase() === "t") {
          event.preventDefault();
          setTracklistOpen(!tracklistOpen);
        }
        revealControls();
      });
    }

    function initMediaSessionActions() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.setActionHandler("play", playAudio);
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("seekbackward", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("seekforward", () => {
        if (!Number.isFinite(audio.duration)) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("previoustrack", () => {
        selectMixtape(activeMixIndex - 1, { autoplay: true, direction: "prev" });
      });
      navigator.mediaSession.setActionHandler("nexttrack", () => {
        selectMixtape(activeMixIndex + 1, { autoplay: true, direction: "next" });
      });
    }

    function applySiteContent() {
      document.title = PORTAL.site.title;
      creditTop.textContent = PORTAL.site.creditTop;
      headline.textContent = PORTAL.site.headline;
      subheadline.textContent = PORTAL.site.subheadline;
      creditBottom.textContent = PORTAL.site.creditBottom;

      portalVideo.poster = PORTAL.video.poster;
      portalVideoSource.setAttribute("src", PORTAL.video.src);
      portalVideo.load();
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        portalVideo.pause();
      }
    }

    function init() {
      applySiteContent();
      renderSelector();
      renderDownloads();
      bindEvents();
      initMediaSessionActions();
      updateMuteUI();
      selectMixtape(0, { autoplay: false, direction: lastDirection });
      setTracklistOpen(false);
      setControlsVisible(true);
    }

    init();
  </script>
</body>
</html>
