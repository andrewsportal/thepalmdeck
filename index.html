<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vagabond</title>
  <meta
    name="description"
    content="A minimal Apple-inspired House mixtape portal with cinematic looping scene videos and lightweight persistent audio playback."
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#111111",
            cream: "#FFF8F0",
            coral: "#E85D04",
            gold: "#FFB703",
          },
        },
      },
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      color: #fff8f0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .scene-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      transition: opacity 420ms ease;
    }

    .scene-video.dim {
      opacity: 0.35;
    }

    .scene-mask {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 16% 14%, rgba(255, 183, 3, 0.16), transparent 42%),
        linear-gradient(to bottom, rgba(17, 17, 17, 0.23), rgba(17, 17, 17, 0.84));
    }

    .controls {
      opacity: 1;
      transition: opacity 320ms ease;
      pointer-events: none;
    }

    .controls.hidden {
      opacity: 0;
    }

    .controls .ui {
      pointer-events: auto;
    }

    .glass {
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      background: rgba(23, 23, 25, 0.56);
      border: 1px solid rgba(255, 248, 240, 0.12);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.36);
    }

    .gloss {
      border: 1px solid rgba(255, 248, 240, 0.25);
      background: linear-gradient(to bottom, rgba(255, 248, 240, 0.15), rgba(255, 248, 240, 0.06));
      color: #fff8f0;
      cursor: pointer;
      transition:
        transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 200ms ease;
    }

    .gloss:hover {
      transform: scale(1.06);
      border-color: rgba(255, 248, 240, 0.4);
    }

    .gloss:active {
      transform: scale(0.94);
    }

    .edge-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      width: 44px;
      height: 56px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 248, 240, 0.2);
      background: rgba(17, 17, 17, 0.3);
      backdrop-filter: blur(14px) saturate(150%);
      -webkit-backdrop-filter: blur(14px) saturate(150%);
      color: rgba(255, 248, 240, 0.9);
      cursor: pointer;
      transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1), background 180ms ease;
    }

    .edge-arrow:hover {
      transform: translateY(-50%) scale(1.06);
      background: rgba(17, 17, 17, 0.45);
    }

    .edge-arrow.left {
      left: 10px;
    }

    .edge-arrow.right {
      right: 10px;
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      position: relative;
      background: rgba(255, 248, 240, 0.18);
      cursor: pointer;
      transition: height 180ms ease;
    }

    .progress:hover,
    .progress:focus-visible {
      height: 6px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #e85d04, #ffb703);
    }

    .progress-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%) scale(0);
      background: #fff8f0;
      pointer-events: none;
      transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress:hover .progress-thumb,
    .progress:focus-visible .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .track-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 340ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .track-panel.open {
      max-height: min(34svh, 310px);
    }

    .track-scroll {
      max-height: min(27svh, 250px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 248, 240, 0.18) transparent;
    }

    .track-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .track-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 248, 240, 0.18);
      border-radius: 999px;
    }

    .tnum {
      font-variant-numeric: tabular-nums;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <video
    id="sceneVideo"
    class="scene-video"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    poster="hero-poster.jpg"
    aria-hidden="true"
  >
    <source id="sceneVideoSource" src="scene-1.mp4" type="video/mp4" />
  </video>
  <div class="scene-mask" aria-hidden="true"></div>

  <main id="stage" class="relative h-[100svh] w-full overflow-hidden">
    <div id="gestureArea" class="absolute inset-0 z-10"></div>

    <div id="controls" class="controls absolute inset-0 z-20 flex flex-col justify-between p-4 md:p-6">
      <button id="prevSceneBtn" type="button" class="edge-arrow left ui" aria-label="Previous mixtape scene">
        <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
          <path d="M15 6l-6 6 6 6"></path>
        </svg>
      </button>
      <button id="nextSceneBtn" type="button" class="edge-arrow right ui" aria-label="Next mixtape scene">
        <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
          <path d="M9 6l6 6-6 6"></path>
        </svg>
      </button>

      <header id="mixHeader" class="ui pt-3 text-center">
        <h1 id="mixHeroTitle" class="text-[clamp(2.2rem,8.4vw,4.6rem)] font-semibold leading-[0.95] tracking-[-0.03em] text-cream">
          Vagabond
        </h1>
        <p id="mixHeroDescription" class="mx-auto mt-2 max-w-[35ch] text-[0.93rem] leading-relaxed text-cream/72 md:text-[1rem]">
          The first glow over the palm deck as the horizon opens.
        </p>
      </header>

      <section class="ui glass mx-0 rounded-3xl p-3 md:mx-auto md:w-full md:max-w-4xl md:p-4" aria-label="Audio controls">
        <div class="flex flex-wrap items-center justify-center gap-2">
          <button id="rewindBtn" type="button" class="gloss inline-flex h-10 w-10 items-center justify-center rounded-full" aria-label="Rewind 10 seconds">
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M11 19a7 7 0 1 1 5.57-11.24"></path>
              <path d="M12 8H8v4"></path>
              <path d="M8 8l5 5"></path>
            </svg>
          </button>

          <button id="playPauseBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full border-gold/45 bg-gradient-to-b from-gold/35 to-coral/24" aria-label="Play">
            <svg id="iconPlay" viewBox="0 0 24 24" class="h-[18px] w-[18px] translate-x-[1px]" fill="#fff8f0" aria-hidden="true">
              <path d="M8 5v14l11-7z"></path>
            </svg>
            <svg id="iconPause" viewBox="0 0 24 24" class="hidden h-[18px] w-[18px]" fill="#fff8f0" aria-hidden="true">
              <path d="M7 5h4v14H7zm6 0h4v14h-4z"></path>
            </svg>
          </button>

          <button id="forwardBtn" type="button" class="gloss inline-flex h-10 w-10 items-center justify-center rounded-full" aria-label="Forward 10 seconds">
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M13 19a7 7 0 1 0-5.57-11.24"></path>
              <path d="M12 8h4v4"></path>
              <path d="M16 8l-5 5"></path>
            </svg>
          </button>

          <button id="tracklistBtn" type="button" class="gloss inline-flex h-10 items-center justify-center rounded-full px-4 text-[0.62rem] font-medium uppercase tracking-[0.14em]" aria-expanded="false" aria-label="Toggle tracklist">
            Tracklist
          </button>

          <button id="muteBtn" type="button" class="gloss inline-flex h-10 w-10 items-center justify-center rounded-full" aria-label="Mute">
            <svg id="iconVol" viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9z"></path>
              <path d="M18.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M20.8 6.1a8.6 8.6 0 0 1 0 11.8"></path>
            </svg>
            <svg id="iconMuted" viewBox="0 0 24 24" class="hidden h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9z"></path>
              <path d="M19 9l-4 6"></path>
              <path d="M15 9l4 6"></path>
            </svg>
          </button>

          <a id="downloadBtn" href="#" download class="gloss inline-flex h-10 items-center justify-center rounded-full px-4 text-[0.62rem] font-medium uppercase tracking-[0.14em] text-cream no-underline" aria-label="Download current mixtape">
            Download
          </a>
        </div>

        <div class="mt-3 grid grid-cols-[auto_1fr_auto] items-center gap-2">
          <span id="timeEl" class="tnum text-[0.68rem] text-cream/58">0:00</span>
          <div id="progressTrack" class="progress" role="slider" tabindex="0" aria-label="Playback progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressThumb" class="progress-thumb"></div>
          </div>
          <span id="durationEl" class="tnum text-[0.68rem] text-cream/58">0:00</span>
        </div>

        <div id="trackPanel" class="track-panel mt-3">
          <ol id="trackList" class="track-scroll space-y-1 text-[0.76rem] leading-relaxed text-cream/78"></ol>
        </div>
      </section>
    </div>
  </main>

  <script>
    // -------------------------------------------------------------
    // PORTAL DATA (single source of truth)
    // -------------------------------------------------------------
    // Update title/description/audio/video/download/tracklist here.
    const PORTAL = {
      fallbackVideo: "sunset-dance-loop.mp4",
      fallbackPoster: "hero-poster.jpg",
      mixtapes: [
        {
          id: "mixtape1",
          title: "Vagabond",
          description: "The first glow over the palm deck as the horizon opens.",
          audio: "mixtape1.mp3",
          download: "mixtape1.mp3",
          video: "scene-1.mp4",
          tracklist: [
            "01. Artist - Opening Horizon",
            "02. Artist - Palm Rhythm",
            "03. Artist - Warm Current",
            "04. Artist - Coastal Groove",
          ],
        },
        {
          id: "mixtape2",
          title: "Palm Current",
          description: "Dusk settles in while the dancefloor drifts into deeper rhythm.",
          audio: "mixtape2.mp3",
          download: "mixtape2.mp3",
          video: "scene-2.mp4",
          tracklist: [
            "01. Artist - Blue Lanterns",
            "02. Artist - Deck Conversations",
            "03. Artist - Salt Air",
            "04. Artist - Night Bloom",
          ],
        },
        {
          id: "mixtape3",
          title: "After Horizon",
          description: "Night wraps the shoreline and the final movement lands softly.",
          audio: "mixtape3.mp3",
          download: "mixtape3.mp3",
          video: "scene-3.mp4",
          tracklist: [
            "01. Artist - Midnight Palms",
            "02. Artist - Quiet Movement",
            "03. Artist - Sea of Lights",
            "04. Artist - Closing Embrace",
          ],
        },
      ],
    };

    const audio = new Audio();
    audio.preload = "metadata";

    let activeMix = 0;
    let isPlaying = false;
    let isScrubbing = false;
    let controlsAreVisible = true;
    let tracklistOpen = false;
    let hideTimer = null;
    let lastDirection = "next";

    const sceneVideo = document.getElementById("sceneVideo");
    const sceneVideoSource = document.getElementById("sceneVideoSource");
    const stage = document.getElementById("stage");
    const gestureArea = document.getElementById("gestureArea");
    const controls = document.getElementById("controls");
    const prevSceneBtn = document.getElementById("prevSceneBtn");
    const nextSceneBtn = document.getElementById("nextSceneBtn");
    const mixHeader = document.getElementById("mixHeader");
    const mixHeroTitle = document.getElementById("mixHeroTitle");
    const mixHeroDescription = document.getElementById("mixHeroDescription");
    const rewindBtn = document.getElementById("rewindBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const iconPlay = document.getElementById("iconPlay");
    const iconPause = document.getElementById("iconPause");
    const forwardBtn = document.getElementById("forwardBtn");
    const tracklistBtn = document.getElementById("tracklistBtn");
    const muteBtn = document.getElementById("muteBtn");
    const iconVol = document.getElementById("iconVol");
    const iconMuted = document.getElementById("iconMuted");
    const downloadBtn = document.getElementById("downloadBtn");
    const progressTrack = document.getElementById("progressTrack");
    const progressFill = document.getElementById("progressFill");
    const progressThumb = document.getElementById("progressThumb");
    const timeEl = document.getElementById("timeEl");
    const durationEl = document.getElementById("durationEl");
    const trackPanel = document.getElementById("trackPanel");
    const trackList = document.getElementById("trackList");

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function normalizeMixIndex(index) {
      const len = PORTAL.mixtapes.length;
      if (!len) return 0;
      return ((index % len) + len) % len;
    }

    function clearHideTimer() {
      if (!hideTimer) return;
      window.clearTimeout(hideTimer);
      hideTimer = null;
    }

    function setControlsVisible(visible) {
      controlsAreVisible = visible;
      controls.classList.toggle("hidden", !visible);
    }

    function scheduleAutoHide() {
      clearHideTimer();
      if (!isPlaying || tracklistOpen) return;
      hideTimer = window.setTimeout(() => {
        setControlsVisible(false);
      }, 1800);
    }

    function revealControls() {
      setControlsVisible(true);
      scheduleAutoHide();
    }

    function setTracklistOpen(open) {
      tracklistOpen = open;
      trackPanel.classList.toggle("open", open);
      tracklistBtn.setAttribute("aria-expanded", String(open));
      tracklistBtn.textContent = open ? "Hide List" : "Tracklist";
      if (open) {
        revealControls();
      } else {
        scheduleAutoHide();
      }
    }

    function updatePlayState(playing) {
      isPlaying = playing;
      iconPlay.classList.toggle("hidden", playing);
      iconPause.classList.toggle("hidden", !playing);
      playPauseBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
      if (playing) {
        scheduleAutoHide();
      } else {
        clearHideTimer();
        setControlsVisible(true);
      }
      updateMediaSession(PORTAL.mixtapes[activeMix]);
    }

    function updateMuteUI() {
      const muted = audio.muted;
      iconVol.classList.toggle("hidden", muted);
      iconMuted.classList.toggle("hidden", !muted);
      muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
    }

    function updateProgressUI() {
      const duration = audio.duration;
      const now = audio.currentTime;
      if (!Number.isFinite(duration) || duration <= 0) {
        progressFill.style.width = "0%";
        progressThumb.style.left = "0%";
        progressTrack.setAttribute("aria-valuenow", "0");
        progressTrack.setAttribute("aria-valuetext", "0:00 of 0:00");
        timeEl.textContent = "0:00";
        durationEl.textContent = "0:00";
        return;
      }
      const pct = Math.min(100, Math.max(0, (now / duration) * 100));
      progressFill.style.width = `${pct}%`;
      progressThumb.style.left = `${pct}%`;
      progressTrack.setAttribute("aria-valuenow", String(Math.round(pct)));
      progressTrack.setAttribute("aria-valuetext", `${formatTime(now)} of ${formatTime(duration)}`);
      timeEl.textContent = formatTime(now);
      durationEl.textContent = formatTime(duration);
    }

    function seekByClientX(clientX) {
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
      const rect = progressTrack.getBoundingClientRect();
      const x = Math.min(Math.max(clientX - rect.left, 0), rect.width);
      audio.currentTime = (x / rect.width) * audio.duration;
      updateProgressUI();
    }

    function renderTracklist(items) {
      trackList.innerHTML = "";
      items.forEach((track) => {
        const li = document.createElement("li");
        li.className = "rounded-lg bg-cream/[0.04] px-2 py-1.5";
        li.textContent = track;
        trackList.appendChild(li);
      });
    }

    function switchSceneVideo(videoPath) {
      const target = videoPath || PORTAL.fallbackVideo;
      if (sceneVideoSource.getAttribute("src") === target) return;
      sceneVideo.classList.add("dim");
      window.setTimeout(() => {
        sceneVideoSource.setAttribute("src", target);
        sceneVideo.load();
        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          sceneVideo.play().catch(() => {});
        }
        sceneVideo.classList.remove("dim");
      }, 140);
    }

    function updateMediaSession(mixtape) {
      if (!("mediaSession" in navigator) || !mixtape) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: mixtape.title,
        artist: "Andrew",
        album: "Palm Deck House",
      });
      navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
    }

    async function playAudio() {
      try {
        await audio.play();
        updatePlayState(true);
      } catch (_error) {
        updatePlayState(false);
      }
    }

    function togglePlayPause() {
      if (audio.paused) {
        playAudio();
      } else {
        audio.pause();
      }
    }

    function selectMixtape(index, options = {}) {
      const {
        autoplay = true,
        direction = "next",
      } = options;
      const nextIndex = normalizeMixIndex(index);
      const mix = PORTAL.mixtapes[nextIndex];
      if (!mix) return;

      activeMix = nextIndex;
      lastDirection = direction;

      mixHeroTitle.textContent = mix.title;
      mixHeroDescription.textContent = mix.description;
      document.title = mix.title;
      downloadBtn.href = mix.download || mix.audio;
      downloadBtn.download = (mix.download || mix.audio).split("/").pop();
      renderTracklist(mix.tracklist);

      switchSceneVideo(mix.video);

      audio.src = mix.audio;
      audio.currentTime = 0;
      audio.load();
      updateProgressUI();
      updateMediaSession(mix);

      if (autoplay) {
        playAudio();
      } else {
        updatePlayState(false);
      }

      revealControls();
    }

    function bindEvents() {
      gestureArea.addEventListener("pointerdown", () => {
        if (!controlsAreVisible) {
          revealControls();
        } else if (isPlaying && !tracklistOpen) {
          setControlsVisible(false);
          clearHideTimer();
        } else {
          revealControls();
        }
      });

      stage.addEventListener("pointermove", () => {
        if (!controlsAreVisible && isPlaying) return;
        if (isPlaying) scheduleAutoHide();
      });

      prevSceneBtn.addEventListener("click", () => {
        selectMixtape(activeMix - 1, { autoplay: true, direction: "prev" });
      });

      nextSceneBtn.addEventListener("click", () => {
        selectMixtape(activeMix + 1, { autoplay: true, direction: "next" });
      });

      playPauseBtn.addEventListener("click", () => {
        togglePlayPause();
        revealControls();
      });

      rewindBtn.addEventListener("click", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
        revealControls();
      });

      forwardBtn.addEventListener("click", () => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
        revealControls();
      });

      tracklistBtn.addEventListener("click", () => {
        setTracklistOpen(!tracklistOpen);
      });

      muteBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        updateMuteUI();
        revealControls();
      });

      downloadBtn.addEventListener("click", () => {
        revealControls();
      });

      progressTrack.addEventListener("pointerdown", (event) => {
        isScrubbing = true;
        seekByClientX(event.clientX);
        progressTrack.setPointerCapture(event.pointerId);
      });

      progressTrack.addEventListener("pointermove", (event) => {
        if (!isScrubbing) return;
        seekByClientX(event.clientX);
      });

      progressTrack.addEventListener("pointerup", () => {
        isScrubbing = false;
      });

      progressTrack.addEventListener("keydown", (event) => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        const step = Math.max(1, audio.duration * 0.02);
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          audio.currentTime = Math.max(0, audio.currentTime - step);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          audio.currentTime = Math.min(audio.duration, audio.currentTime + step);
        } else if (event.key === "Home") {
          event.preventDefault();
          audio.currentTime = 0;
        } else if (event.key === "End") {
          event.preventDefault();
          audio.currentTime = audio.duration;
        }
        updateProgressUI();
      });

      audio.addEventListener("loadedmetadata", updateProgressUI);
      audio.addEventListener("timeupdate", updateProgressUI);
      audio.addEventListener("play", () => updatePlayState(true));
      audio.addEventListener("pause", () => updatePlayState(false));
      audio.addEventListener("ended", () => updatePlayState(false));

      sceneVideo.addEventListener("error", () => {
        if (sceneVideoSource.getAttribute("src") === PORTAL.fallbackVideo) return;
        sceneVideoSource.setAttribute("src", PORTAL.fallbackVideo);
        sceneVideo.load();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          // Keep audio running, pause visual decode for lower memory.
          sceneVideo.pause();
        } else if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          sceneVideo.play().catch(() => {});
        }
      });

      document.addEventListener("keydown", (event) => {
        const inInput = event.target.closest("input, textarea, select, [contenteditable], button, a");
        if (inInput) return;
        if (event.key === " ") {
          event.preventDefault();
          togglePlayPause();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          audio.muted = !audio.muted;
          updateMuteUI();
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          selectMixtape(activeMix - 1, { autoplay: true, direction: "prev" });
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          selectMixtape(activeMix + 1, { autoplay: true, direction: "next" });
        } else if (event.key.toLowerCase() === "t") {
          event.preventDefault();
          setTracklistOpen(!tracklistOpen);
        }
        revealControls();
      });
    }

    function initMediaSessionActions() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.setActionHandler("play", playAudio);
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("seekbackward", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("seekforward", () => {
        if (!Number.isFinite(audio.duration)) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("previoustrack", () => {
        selectMixtape(activeMix - 1, { autoplay: true, direction: "prev" });
      });
      navigator.mediaSession.setActionHandler("nexttrack", () => {
        selectMixtape(activeMix + 1, { autoplay: true, direction: "next" });
      });
    }

    function init() {
      sceneVideo.poster = PORTAL.fallbackPoster;
      sceneVideoSource.setAttribute("src", PORTAL.mixtapes[0].video || PORTAL.fallbackVideo);
      sceneVideo.load();
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        sceneVideo.pause();
      }
      bindEvents();
      initMediaSessionActions();
      updateMuteUI();
      selectMixtape(0, { autoplay: false, direction: lastDirection });
      setTracklistOpen(false);
      setControlsVisible(true);
    }

    init();
  </script>
</body>
</html>
