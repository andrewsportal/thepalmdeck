<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Peep This Tube — a minimal, distraction-free theater for watching videos by Andrew Rios." />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>Peep This Tube — Minimal Theater</title>
  <style>
    :root {
      color-scheme: dark;
      --player-inset-x: 0px;
      --player-inset-top: 0px;
      --player-inset-bottom: 0px;
      --player-focus-y: 50%;
      --text: rgba(255, 255, 255, 0.98);
      --text-soft: rgba(235, 235, 240, 0.82);
      --text-muted: rgba(210, 210, 216, 0.62);
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.28);
      --accent: #DB8B32;
      --accent-tint: #E89A45;
      --accent-soft: rgba(219, 139, 50, 0.3);
      --focus: rgba(232, 154, 69, 0.5);
      --hairline-top: rgba(255, 255, 255, 0.14);
      --panel: rgba(28, 28, 30, 0.52);
      --panel-strong: rgba(28, 28, 30, 0.72);
      --panel-elevated: rgba(44, 44, 46, 0.62);
      --shadow-soft: 0 12px 34px rgba(0, 0, 0, 0.44);
      --shadow-tight: 0 6px 18px rgba(0, 0, 0, 0.34);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --t: 280ms var(--ease);
      --seek-fill: rgba(255, 255, 255, 0.96);
      --seek-track: rgba(255, 255, 255, 0.22);
      accent-color: var(--accent);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(120% 110% at 50% 100%, rgba(219, 139, 50, 0.08), transparent 48%),
        #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      background: #000;
      isolation: isolate;
    }

    @supports (height: 100dvh) {
      .app {
        min-height: 100dvh;
      }
    }

    .player-stage {
      position: absolute;
      inset: var(--player-inset-top) var(--player-inset-x) var(--player-inset-bottom) var(--player-inset-x);
      overflow: hidden;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center var(--player-focus-y);
      background: #000;
      touch-action: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, transparent 22%, transparent 68%, rgba(0, 0, 0, 0.86) 100%),
        radial-gradient(130% 95% at 50% 50%, transparent 55%, rgba(0, 0, 0, 0.26) 100%);
    }

    .ui {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      padding:
        calc(14px + env(safe-area-inset-top, 0px))
        max(12px, env(safe-area-inset-right, 0px))
        calc(14px + env(safe-area-inset-bottom, 0px))
        max(12px, env(safe-area-inset-left, 0px));
      transition: opacity var(--t), transform var(--t), filter var(--t);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .app.is-ui-hidden .ui {
      opacity: 0;
      transform: translateY(8px) scale(0.995);
      filter: blur(0.6px);
      pointer-events: none;
    }

    .top-zone,
    .bottom-zone {
      pointer-events: auto;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 10px 9px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow:
        var(--shadow-tight),
        inset 0 1px 0 var(--hairline-top);
      backdrop-filter: saturate(180%) blur(22px);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
    }

    .meta {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .title {
      margin: 0;
      font-size: clamp(0.94rem, 1.65vw, 1.08rem);
      line-height: 1.24;
      font-weight: 635;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(58vw, 620px);
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.22);
    }

    .credit-line {
      margin: 0;
      font-size: 0.66rem;
      line-height: 1.24;
      letter-spacing: 0.048em;
      font-weight: 540;
      color: rgba(210, 210, 216, 0.6);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(58vw, 620px);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ghost-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-soft);
      height: 44px;
      width: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      cursor: pointer;
      font: inherit;
      position: relative;
      transition:
        color var(--t),
        background-color var(--t),
        transform var(--t);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .ghost-btn svg {
      width: 25px;
      height: 25px;
      display: block;
      pointer-events: none;
    }

    .ghost-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .ghost-btn:active {
      transform: scale(0.9);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .ghost-btn:focus-visible {
      outline: none;
      color: #fff;
      box-shadow: 0 0 0 3px var(--focus);
    }

    .playlist-section {
      margin-top: 10px;
      max-height: 0;
      opacity: 0;
      transform: translateX(10px);
      overflow: hidden;
      pointer-events: none;
      transition: max-height var(--t), opacity var(--t), transform var(--t);
    }

    .app.is-playlist-open .playlist-section {
      max-height: 110px;
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .playlist-rail {
      display: flex;
      align-items: stretch;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 2px 4px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
    }

    .playlist-rail::-webkit-scrollbar {
      height: 5px;
    }

    .playlist-rail::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.28);
      border-radius: 999px;
    }

    .playlist-item {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: var(--panel-elevated);
      color: var(--text);
      border-radius: var(--radius-md);
      min-height: 50px;
      min-width: min(280px, 78vw);
      max-width: min(360px, 86vw);
      padding: 9px 11px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      transition: all var(--t);
      scroll-snap-align: start;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
      backdrop-filter: saturate(140%) blur(10px);
      -webkit-backdrop-filter: saturate(140%) blur(10px);
    }

    .playlist-item:hover {
      background: rgba(64, 64, 66, 0.6);
      border-color: var(--line-strong);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.34);
    }

    .playlist-item:focus-visible {
      outline: none;
      border-color: rgba(232, 178, 115, 0.74);
      box-shadow:
        0 0 0 3px var(--focus),
        0 8px 20px rgba(0, 0, 0, 0.34);
    }

    .playlist-item.is-active {
      background: rgba(150, 92, 34, 0.48);
      border-color: rgba(233, 182, 120, 0.56);
    }

    .playlist-item-id {
      font-size: 0.63rem;
      font-weight: 620;
      letter-spacing: 0.075em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .playlist-item-title {
      font-size: 0.84rem;
      font-weight: 610;
      line-height: 1.24;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom-zone {
      display: grid;
      gap: 0;
      padding: 12px 14px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow:
        var(--shadow-soft),
        inset 0 1px 0 var(--hairline-top);
      backdrop-filter: saturate(180%) blur(22px);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
    }

    .seek-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .time {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-soft);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }

    .seek {
      width: 100%;
      margin: 0;
      height: 22px;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .seek:focus-visible {
      outline: none;
    }

    /* iOS-style scrubber: a slim track that thickens while you drag, with a
       knob that only appears on touch. */
    .seek::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background:
        linear-gradient(90deg,
          var(--seek-fill) 0 var(--seek-progress, 0%),
          var(--seek-track) var(--seek-progress, 0%) 100%);
      transition: height var(--t);
    }

    .app.is-scrubbing .seek::-webkit-slider-runnable-track {
      height: 7px;
    }

    .seek::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6px;
      border: none;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: scale(0.3);
      transition: opacity var(--t), transform var(--t);
    }

    .app.is-scrubbing .seek::-webkit-slider-thumb {
      margin-top: -4.5px;
      opacity: 1;
      transform: scale(1);
    }

    .seek::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: var(--seek-track);
      transition: height var(--t);
    }

    .app.is-scrubbing .seek::-moz-range-track {
      height: 7px;
    }

    .seek::-moz-range-progress {
      height: 4px;
      border-radius: 999px;
      background: var(--seek-fill);
    }

    .app.is-scrubbing .seek::-moz-range-progress {
      height: 7px;
    }

    .seek::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity var(--t);
    }

    .app.is-scrubbing .seek::-moz-range-thumb {
      opacity: 1;
    }

    .transport-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: nowrap;
      margin-bottom: 4px;
    }

    .mute-btn .icon-unmute {
      display: none;
    }

    .mute-btn.is-muted .icon-mute {
      display: none;
    }

    .mute-btn.is-muted .icon-unmute {
      display: block;
    }

    .play-btn {
      appearance: none;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      padding: 0;
      display: grid;
      place-items: center;
      color: #fff;
      cursor: pointer;
      border: none;
      background: linear-gradient(180deg, var(--accent-tint), var(--accent));
      box-shadow: 0 8px 22px rgba(219, 139, 50, 0.38);
      transition:
        transform var(--t),
        box-shadow var(--t),
        filter var(--t);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn:hover {
      filter: brightness(1.06);
      box-shadow: 0 10px 26px rgba(219, 139, 50, 0.46);
    }

    .play-btn:active {
      transform: scale(0.92);
      box-shadow: 0 6px 16px rgba(219, 139, 50, 0.34);
    }

    .play-btn:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 4px var(--focus),
        0 8px 22px rgba(219, 139, 50, 0.4);
    }

    .play-btn svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .play-btn .icon-play {
      margin-left: 2px;
    }

    .play-btn .icon-pause {
      display: none;
    }

    .play-btn.is-playing .icon-play {
      display: none;
    }

    .play-btn.is-playing .icon-pause {
      display: block;
    }

    .osd {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 14px) scale(0.96);
      z-index: 10;
      pointer-events: none;
      border-radius: 999px;
      border: 1px solid var(--hairline-top);
      background: var(--panel-strong);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 640;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      padding: 9px 18px;
      opacity: 0;
      transition: opacity var(--t), transform var(--t);
      white-space: nowrap;
      backdrop-filter: blur(20px) saturate(170%);
      -webkit-backdrop-filter: blur(20px) saturate(170%);
      box-shadow:
        var(--shadow-tight),
        inset 0 1px 0 var(--hairline-top);
    }

    .osd.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .ui {
        padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px));
      }

      .top-row {
        gap: 10px;
        padding: 9px 10px;
        border-radius: var(--radius-md);
      }

      .title {
        max-width: 50vw;
        font-size: 0.93rem;
      }

      .bottom-zone {
        padding: 10px 10px 8px;
        border-radius: var(--radius-md);
      }

      .seek-row {
        gap: 7px;
        margin-bottom: 8px;
      }

      .credit-line {
        font-size: 0.62rem;
        max-width: 50vw;
      }

      .transport-row {
        gap: 8px;
        margin-bottom: 8px;
      }

      .ghost-btn {
        height: 42px;
        width: 42px;
      }

      .ghost-btn svg {
        width: 24px;
        height: 24px;
      }

      .playlist-item {
        min-width: 78vw;
      }
    }

    @media (pointer: coarse) {
      .ghost-btn {
        height: 46px;
        width: 46px;
      }

      .play-btn {
        width: 60px;
        height: 60px;
      }

      .transport-row {
        gap: 12px;
      }

      .playlist-item {
        min-height: 52px;
      }
    }

    @media (prefers-contrast: more) {
      .top-row,
      .bottom-zone,
      .playlist-item {
        border-color: rgba(255, 255, 255, 0.5);
      }

      .ghost-btn,
      .playlist-item {
        color: #fff;
      }
    }

    @media (prefers-reduced-transparency: reduce) {
      .top-row,
      .bottom-zone,
      .osd,
      .playlist-item {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      .top-row,
      .bottom-zone {
        background: rgba(24, 24, 26, 0.96);
      }

      .osd {
        background: rgba(24, 24, 26, 0.98);
      }

      .playlist-item {
        background: rgba(44, 44, 46, 0.98);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-label="Minimal theater video player">
    <div class="player-stage" id="playerStage">
      <video id="player" preload="metadata" playsinline></video>
    </div>
    <div class="vignette" aria-hidden="true"></div>

    <div class="ui" id="ui">
      <section class="top-zone">
        <div class="top-row">
          <div class="meta">
            <h1 class="title" id="nowPlayingTitle">Loading playlist...</h1>
            <p class="credit-line" id="creditLine">Filmed &amp; Edited by: Andrew Rios</p>
          </div>
          <div class="top-actions">
            <button class="ghost-btn" id="playlistToggle" type="button" aria-expanded="false" aria-controls="playlistRail" aria-label="Playlist">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <g fill="currentColor">
                  <circle cx="4.5" cy="6.5" r="1.6"></circle>
                  <rect x="8.5" y="5.4" width="12" height="2.2" rx="1.1"></rect>
                  <circle cx="4.5" cy="12" r="1.6"></circle>
                  <rect x="8.5" y="10.9" width="12" height="2.2" rx="1.1"></rect>
                  <circle cx="4.5" cy="17.5" r="1.6"></circle>
                  <rect x="8.5" y="16.4" width="12" height="2.2" rx="1.1"></rect>
                </g>
              </svg>
            </button>
          </div>
        </div>

        <div class="playlist-section" id="playlistSection" aria-hidden="true">
          <div class="playlist-rail" id="playlistRail" role="listbox" aria-label="Video playlist"></div>
        </div>
      </section>

      <section class="bottom-zone">
        <div class="seek-row">
          <span class="time" id="timeCurrent">0:00</span>
          <input class="seek" id="seekBar" type="range" min="0" max="1000" step="1" value="0" aria-label="Seek timeline" />
          <span class="time" id="timeTotal">--:--</span>
        </div>

        <div class="transport-row" aria-label="Playback controls">
          <button class="ghost-btn" id="prevBtn" type="button" aria-label="Previous video">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M7.5 5.5a1 1 0 0 1 2 0V18a1 1 0 0 1-2 0z"></path>
              <path d="M18 6.6v10.8a1 1 0 0 1-1.53.85l-8.2-5.4a1 1 0 0 1 0-1.7l8.2-5.4A1 1 0 0 1 18 6.6z"></path>
            </svg>
          </button>

          <button class="ghost-btn" id="rewindBtn" type="button" aria-label="Rewind 10 seconds">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                d="M4.6 12a7.4 7.4 0 1 0 2.3-5.35"></path>
              <path fill="currentColor" d="M3.4 4.2 4.7 8.9l4.6-1.35z"></path>
              <text x="12.4" y="15.4" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
                font-size="8" font-weight="700" fill="currentColor">10</text>
            </svg>
          </button>

          <button class="play-btn" id="playBtn" type="button" aria-label="Play video">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M7 4.8v14.4a1 1 0 0 0 1.53.85l11.2-7.2a1 1 0 0 0 0-1.7L8.53 3.95A1 1 0 0 0 7 4.8z"></path>
            </svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="6" y="5" width="4.4" height="14" rx="1.6"></rect>
              <rect x="13.6" y="5" width="4.4" height="14" rx="1.6"></rect>
            </svg>
          </button>

          <button class="ghost-btn" id="forwardBtn" type="button" aria-label="Forward 10 seconds">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                d="M19.4 12a7.4 7.4 0 1 1-2.3-5.35"></path>
              <path fill="currentColor" d="M20.6 4.2 19.3 8.9l-4.6-1.35z"></path>
              <text x="11.6" y="15.4" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
                font-size="8" font-weight="700" fill="currentColor">10</text>
            </svg>
          </button>

          <button class="ghost-btn" id="nextBtn" type="button" aria-label="Next video">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M16.5 5.5a1 1 0 0 0-2 0V18a1 1 0 0 0 2 0z"></path>
              <path d="M6 6.6v10.8a1 1 0 0 0 1.53.85l8.2-5.4a1 1 0 0 0 0-1.7l-8.2-5.4A1 1 0 0 0 6 6.6z"></path>
            </svg>
          </button>

          <button class="ghost-btn mute-btn" id="muteBtn" type="button" aria-label="Mute audio">
            <svg class="icon-mute" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M4 9.3v5.4a1 1 0 0 0 1 1h2.9l3.5 2.95a1 1 0 0 0 1.65-.77V6.12a1 1 0 0 0-1.65-.77L7.9 8.3H5a1 1 0 0 0-1 1z"></path>
              <path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                d="M16 9.2a4 4 0 0 1 0 5.6M18.7 6.7a7.5 7.5 0 0 1 0 10.6"></path>
            </svg>
            <svg class="icon-unmute" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M4 9.3v5.4a1 1 0 0 0 1 1h2.9l3.5 2.95a1 1 0 0 0 1.65-.77V6.12a1 1 0 0 0-1.65-.77L7.9 8.3H5a1 1 0 0 0-1 1z"></path>
              <path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                d="M16.5 9.5 21 14M21 9.5 16.5 14"></path>
            </svg>
          </button>
        </div>
      </section>
    </div>

    <div class="osd" id="osd" aria-hidden="true"></div>
    <span class="sr-only" id="liveRegion" aria-live="polite"></span>
  </main>

  <script>
    const TITLE_SOURCE = "titles.txt";
    const PLAYER_ID = "player";

    // How long the controls stay visible after your last interaction while a
    // video is playing (ms). ~3s matches YouTube / native player behavior.
    const UI_HIDE_DELAY = 3000;

    const videos = [];
    let currentId = null;
    let fallbackAttempted = false;
    let playlistVisible = false;
    let osdTimer = null;
    let hideUiTimer = null;
    let isScrubbing = false;

    const app = document.getElementById("app");
    const player = document.getElementById(PLAYER_ID);
    const ui = document.getElementById("ui");

    const playlistToggle = document.getElementById("playlistToggle");
    const playlistSection = document.getElementById("playlistSection");
    const playlistRail = document.getElementById("playlistRail");
    const topZone = document.querySelector(".top-zone");
    const bottomZone = document.querySelector(".bottom-zone");

    const nowPlayingTitle = document.getElementById("nowPlayingTitle");

    const playBtn = document.getElementById("playBtn");
    const rewindBtn = document.getElementById("rewindBtn");
    const forwardBtn = document.getElementById("forwardBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const muteBtn = document.getElementById("muteBtn");

    const seekBar = document.getElementById("seekBar");
    const timeCurrent = document.getElementById("timeCurrent");
    const timeTotal = document.getElementById("timeTotal");

    const osd = document.getElementById("osd");
    const liveRegion = document.getElementById("liveRegion");

    async function loadTitles() {
      try {
        const response = await fetch(TITLE_SOURCE);
        if (!response.ok) return [];
        return (await response.text())
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    async function loadData() {
      const titles = await loadTitles();
      videos.length = 0;

      for (let i = 1; i <= titles.length; i += 1) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.MP4`
        });
      }

      if (!videos.length) {
        videos.push({ id: 1, title: "Video 1", src: "video1.MP4" });
      }
    }

    // Toggle the extension casing so a case-sensitive host can still resolve
    // the file if the primary request 404s (e.g. .MP4 <-> .mp4).
    function getFallbackSource(src) {
      return /\.MP4$/.test(src)
        ? src.replace(/\.MP4$/, ".mp4")
        : src.replace(/\.mp4$/i, ".MP4");
    }

    function padVideoNumber(id) {
      return String(id).padStart(2, "0");
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "--:--";
      const total = Math.floor(seconds);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showOSD(text, duration = 1300) {
      osd.textContent = text;
      liveRegion.textContent = text;
      osd.classList.add("is-visible");
      clearTimeout(osdTimer);
      osdTimer = setTimeout(() => {
        osd.classList.remove("is-visible");
      }, duration);
    }

    function setPlayButtonState(isPlaying) {
      playBtn.classList.toggle("is-playing", isPlaying);
      playBtn.setAttribute("aria-label", isPlaying ? "Pause video" : "Play video");
    }

    function updateMuteButton() {
      const muted = player.muted;
      muteBtn.classList.toggle("is-muted", muted);
      muteBtn.setAttribute("aria-label", muted ? "Unmute audio" : "Mute audio");
    }

    function updateNowPlaying(video) {
      nowPlayingTitle.textContent = video.title;
    }

    // Paint the leading (played) portion of the scrubber to match the thumb.
    function updateSeekFill() {
      const pct = (Number(seekBar.value) / 1000) * 100;
      seekBar.style.setProperty("--seek-progress", `${pct}%`);
    }

    function updateTimeline() {
      const duration = Number.isFinite(player.duration) ? player.duration : 0;
      const current = Number.isFinite(player.currentTime) ? player.currentTime : 0;
      timeCurrent.textContent = formatTime(current);
      timeTotal.textContent = duration > 0 ? formatTime(duration) : "--:--";

      if (!isScrubbing) {
        seekBar.value = duration > 0 ? String(Math.round((current / duration) * 1000)) : "0";
      }
      updateSeekFill();
    }

    function getCurrentIndex() {
      return videos.findIndex((video) => video.id === currentId);
    }

    function getCurrentVideo() {
      return videos.find((video) => video.id === currentId) || null;
    }

    function getInitialVideoIdFromUrl() {
      const raw = new URLSearchParams(window.location.search).get("v");
      const parsed = Number.parseInt(raw, 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
    }

    function syncUrlForVideo(id) {
      try {
        const url = new URL(window.location.href);
        url.searchParams.set("v", String(id));
        history.replaceState({ v: id }, "", url);
      } catch (error) {
        /* no-op */
      }
    }

    function getPlaylistItems() {
      return Array.from(playlistRail.querySelectorAll(".playlist-item"));
    }

    function focusPlaylistItem(index) {
      const items = getPlaylistItems();
      if (!items.length) return;
      const safe = ((index % items.length) + items.length) % items.length;

      items.forEach((item, i) => {
        item.tabIndex = i === safe ? 0 : -1;
      });

      items[safe].focus({ preventScroll: true });
      items[safe].scrollIntoView({ behavior: "smooth", inline: "nearest", block: "nearest" });
    }

    function renderPlaylist() {
      playlistRail.innerHTML = "";

      videos.forEach((video) => {
        const item = document.createElement("button");
        item.type = "button";
        item.id = `playlist-item-${video.id}`;
        item.className = "playlist-item";
        item.setAttribute("role", "option");
        item.setAttribute("aria-selected", String(video.id === currentId));
        item.tabIndex = -1;

        if (video.id === currentId) item.classList.add("is-active");

        const id = document.createElement("span");
        id.className = "playlist-item-id";
        id.textContent = `#${padVideoNumber(video.id)}`;

        const title = document.createElement("span");
        title.className = "playlist-item-title";
        title.textContent = video.title;

        item.append(id, title);

        item.addEventListener("click", () => {
          loadVideo(video.id);
          setPlaylistVisible(false, { returnFocus: true });
        });

        playlistRail.appendChild(item);
      });
    }

    function setPlaylistVisible(visible, { focus = false, returnFocus = false } = {}) {
      playlistVisible = visible;
      app.classList.toggle("is-playlist-open", visible);
      playlistToggle.setAttribute("aria-expanded", String(visible));
      playlistSection.setAttribute("aria-hidden", String(!visible));

      if (visible) {
        renderPlaylist();
        const currentIndex = videos.findIndex((video) => video.id === currentId);
        if (focus) focusPlaylistItem(currentIndex >= 0 ? currentIndex : 0);
        showUi(true);
      } else {
        getPlaylistItems().forEach((item) => {
          item.tabIndex = -1;
        });
        if (returnFocus) playlistToggle.focus();
        hideUiAfterDelay();
      }

      updatePlayerInsets();
    }

    async function safePlay(showHint = true) {
      try {
        await player.play();
        return true;
      } catch (error) {
        if (showHint) showOSD("TAP PLAY");
        return false;
      }
    }

    async function togglePlayback() {
      if (player.paused) {
        await safePlay(true);
      } else {
        player.pause();
      }
    }

    function seekBy(seconds) {
      const duration = Number.isFinite(player.duration)
        ? player.duration
        : (player.currentTime || 0) + Math.abs(seconds);
      player.currentTime = Math.min(Math.max(0, (player.currentTime || 0) + seconds), duration);
    }

    async function loadVideo(id) {
      const selected = videos.find((video) => video.id === id);
      if (!selected) return;

      currentId = id;
      syncUrlForVideo(id);
      fallbackAttempted = false;
      player.src = selected.src;

      updateNowPlaying(selected);
      renderPlaylist();

      await safePlay(true);
    }

    function stepVideo(step) {
      if (!videos.length) return;
      const currentIndex = getCurrentIndex();
      const safeIndex = currentIndex >= 0 ? currentIndex : 0;
      const nextIndex = (safeIndex + step + videos.length) % videos.length;
      loadVideo(videos[nextIndex].id);
    }

    function showUi(lock = false) {
      app.classList.remove("is-ui-hidden");
      clearTimeout(hideUiTimer);
      if (!lock) hideUiAfterDelay();
    }

    function hideUiAfterDelay() {
      clearTimeout(hideUiTimer);
      if (player.paused || playlistVisible || isScrubbing) return;
      hideUiTimer = setTimeout(() => {
        app.classList.add("is-ui-hidden");
      }, UI_HIDE_DELAY);
    }

    function isEditingTarget(target) {
      if (!(target instanceof HTMLElement)) return false;
      return /input|textarea|select/i.test(target.tagName);
    }

    function handlePlaylistKeys(event) {
      if (!playlistVisible) return false;
      const items = getPlaylistItems();
      if (!items.length) return false;

      const currentIndex = items.findIndex((item) => item === document.activeElement);
      const safeCurrent = currentIndex >= 0 ? currentIndex : 0;

      if (event.key === "ArrowRight") {
        event.preventDefault();
        focusPlaylistItem(safeCurrent + 1);
        return true;
      }

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        focusPlaylistItem(safeCurrent - 1);
        return true;
      }

      if (event.key === "Home") {
        event.preventDefault();
        focusPlaylistItem(0);
        return true;
      }

      if (event.key === "End") {
        event.preventDefault();
        focusPlaylistItem(items.length - 1);
        return true;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        items[safeCurrent].click();
        return true;
      }

      if (event.key === "Escape") {
        event.preventDefault();
        setPlaylistVisible(false, { returnFocus: true });
        return true;
      }

      return false;
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    async function requestFullscreen() {
      const root = document.documentElement;
      const fn = root.requestFullscreen || root.webkitRequestFullscreen;
      if (!fn) return false;
      try {
        const result = fn.call(root);
        if (result && typeof result.then === "function") await result;
        return true;
      } catch (error) {
        return false;
      }
    }

    async function exitFullscreen() {
      const fn = document.exitFullscreen || document.webkitExitFullscreen;
      if (!fn) return false;
      try {
        const result = fn.call(document);
        if (result && typeof result.then === "function") await result;
        return true;
      } catch (error) {
        return false;
      }
    }

    async function toggleFullscreen() {
      if (getFullscreenElement()) {
        await exitFullscreen();
      } else {
        const ok = await requestFullscreen();
        if (!ok && typeof player.webkitEnterFullscreen === "function") {
          try {
            player.webkitEnterFullscreen();
          } catch (error) {
            /* no-op */
          }
        }
      }
    }

    function armFullscreenOnGesture() {
      const once = async () => {
        await requestFullscreen();
      };
      window.addEventListener("pointerdown", once, { once: true });
      window.addEventListener("keydown", once, { once: true });
    }

    function updatePlayerInsets() {
      const isPhoneViewport = window.matchMedia("(max-width: 720px)").matches;

      if (!isPhoneViewport) {
        app.style.setProperty("--player-inset-x", "0px");
        app.style.setProperty("--player-inset-top", "0px");
        app.style.setProperty("--player-inset-bottom", "0px");
        return;
      }

      const topHeight = topZone ? topZone.getBoundingClientRect().height : 0;
      const bottomHeight = bottomZone ? bottomZone.getBoundingClientRect().height : 0;
      const uiStyles = ui ? getComputedStyle(ui) : null;
      const uiTopPad = uiStyles ? Number.parseFloat(uiStyles.paddingTop) || 0 : 0;
      const uiLeftPad = uiStyles ? Number.parseFloat(uiStyles.paddingLeft) || 0 : 0;
      const uiBottomPad = uiStyles ? Number.parseFloat(uiStyles.paddingBottom) || 0 : 0;

      /*
        Reserve matte rails from the *actual* UI footprint so controls stay off
        active color video, while avoiding over-shifting in iOS webviews.
      */
      const matteGap = 12;
      const topInset = Math.round(topHeight + uiTopPad + matteGap);
      const bottomInset = Math.round(bottomHeight + uiBottomPad + matteGap);
      const xInset = Math.round(Math.max(8, Math.min(20, uiLeftPad + 2)));

      app.style.setProperty("--player-inset-x", `${xInset}px`);
      app.style.setProperty("--player-inset-top", `${topInset}px`);
      app.style.setProperty("--player-inset-bottom", `${bottomInset}px`);
    }

    // Pin the app to the actual visible viewport height. iOS Safari can leave
    // 100vh / 100dvh stale after its toolbars move or after exiting video
    // fullscreen, which pushes the top and bottom panels off-screen; measuring
    // the visual viewport keeps both panels inside the visible area.
    function syncViewportHeight() {
      const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      if (height) app.style.height = `${Math.round(height)}px`;
    }

    // Coalesce bursty resize/viewport events into one layout read per frame.
    let insetFrame = null;
    function scheduleInsetUpdate() {
      if (insetFrame !== null) return;
      insetFrame = requestAnimationFrame(() => {
        insetFrame = null;
        syncViewportHeight();
        updatePlayerInsets();
      });
    }

    // Touch model:
    //   single tap             -> play / pause
    //   double-tap left third  -> seek -10s
    //   double-tap right third -> seek +10s
    //   swipe left             -> next video
    //   swipe right            -> previous video
    // Only the side thirds wait for a possible second tap, so a center tap
    // toggles playback instantly.
    function bindGestures() {
      const SWIPE_MIN_X = 55;
      const TAP_MAX_MOVE = 14;
      const DOUBLE_TAP_MS = 300;

      let startX = 0;
      let startY = 0;
      let tracking = false;
      let lastTapTime = 0;
      let lastTapSide = "";
      let tapTimer = null;
      let uiWasHidden = false;

      const clearPendingTap = () => {
        if (tapTimer !== null) {
          clearTimeout(tapTimer);
          tapTimer = null;
        }
      };

      // A single tap while the controls are hidden should only reveal them —
      // it must not pause a playing video. Toggling playback requires the
      // controls to already be visible (a second tap).
      const tapTogglePlayback = () => {
        if (uiWasHidden && !player.paused) {
          // Controls were hidden while playing: this tap only woke them up.
          // Let them fade again after the usual delay instead of pausing.
          hideUiAfterDelay();
          return;
        }
        togglePlayback();
      };

      const sideAt = (clientX) => {
        const rect = player.getBoundingClientRect();
        const ratio = rect.width ? (clientX - rect.left) / rect.width : 0.5;
        if (ratio < 0.34) return "left";
        if (ratio > 0.66) return "right";
        return "center";
      };

      player.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        tracking = true;
        startX = event.clientX;
        startY = event.clientY;
        // Capture the visibility state before any other handler wakes the UI,
        // so pointerup can tell a "wake" tap apart from an "act" tap.
        uiWasHidden = app.classList.contains("is-ui-hidden");
      });

      player.addEventListener("pointercancel", () => {
        tracking = false;
      });

      player.addEventListener("pointerup", (event) => {
        if (!tracking) return;
        tracking = false;

        const dx = event.clientX - startX;
        const dy = event.clientY - startY;

        // Horizontal swipe -> change video (left = next, right = previous).
        if (Math.abs(dx) >= SWIPE_MIN_X && Math.abs(dx) > Math.abs(dy)) {
          clearPendingTap();
          showUi(true);
          stepVideo(dx < 0 ? 1 : -1);
          return;
        }

        // A drag that is neither a tap nor a horizontal swipe does nothing.
        if (Math.abs(dx) > TAP_MAX_MOVE || Math.abs(dy) > TAP_MAX_MOVE) return;

        showUi(true);
        const side = sideAt(event.clientX);
        const now = performance.now();

        // Second quick tap on the same side -> seek instead of play/pause.
        if (side !== "center" && side === lastTapSide && now - lastTapTime <= DOUBLE_TAP_MS) {
          clearPendingTap();
          lastTapTime = 0;
          lastTapSide = "";
          seekBy(side === "left" ? -10 : 10);
          showOSD(side === "left" ? "−10s" : "+10s");
          // Let the controls fade on their own after a seek, the same way they
          // do after the video first starts playing.
          hideUiAfterDelay();
          return;
        }

        lastTapTime = now;
        lastTapSide = side;
        clearPendingTap();

        if (side === "center") {
          tapTogglePlayback();
        } else {
          tapTimer = setTimeout(() => {
            tapTimer = null;
            tapTogglePlayback();
          }, DOUBLE_TAP_MS);
        }
      });
    }

    function bindEvents() {
      playBtn.addEventListener("click", async () => {
        showUi(true);
        await togglePlayback();
      });

      rewindBtn.addEventListener("click", () => {
        showUi(true);
        seekBy(-10);
        showOSD("−10s");
      });

      forwardBtn.addEventListener("click", () => {
        showUi(true);
        seekBy(10);
        showOSD("+10s");
      });

      prevBtn.addEventListener("click", () => {
        showUi(true);
        stepVideo(-1);
      });

      nextBtn.addEventListener("click", () => {
        showUi(true);
        stepVideo(1);
      });

      muteBtn.addEventListener("click", () => {
        showUi(true);
        player.muted = !player.muted;
        updateMuteButton();
      });

      playlistToggle.addEventListener("click", () => {
        setPlaylistVisible(!playlistVisible, { focus: !playlistVisible });
      });

      seekBar.addEventListener("pointerdown", () => {
        isScrubbing = true;
        app.classList.add("is-scrubbing");
        showUi(true);
      });

      document.addEventListener("pointerup", () => {
        if (!isScrubbing) return;
        isScrubbing = false;
        app.classList.remove("is-scrubbing");
        osd.classList.remove("is-visible");
        hideUiAfterDelay();
      });

      seekBar.addEventListener("input", () => {
        const duration = Number.isFinite(player.duration) ? player.duration : 0;
        if (duration > 0) {
          player.currentTime = (Number(seekBar.value) / 1000) * duration;
        }
        updateTimeline();
        // Show a live time badge while dragging, iOS-style.
        if (duration > 0) {
          osd.textContent = `${formatTime(player.currentTime)} / ${formatTime(duration)}`;
          osd.classList.add("is-visible");
          clearTimeout(osdTimer);
        }
        showUi(true);
      });

      document.addEventListener("pointerdown", (event) => {
        if (!playlistVisible) return;
        if (!(event.target instanceof Node)) return;
        if (playlistSection.contains(event.target) || playlistToggle.contains(event.target)) return;
        setPlaylistVisible(false);
      });

      app.addEventListener("pointermove", () => showUi());
      app.addEventListener("pointerdown", () => showUi());

      player.addEventListener("play", () => {
        setPlayButtonState(true);
        hideUiAfterDelay();
      });

      player.addEventListener("pause", () => {
        setPlayButtonState(false);
        showUi(true);
      });

      player.addEventListener("timeupdate", updateTimeline);
      player.addEventListener("durationchange", updateTimeline);
      player.addEventListener("loadedmetadata", updateTimeline);

      player.addEventListener("volumechange", updateMuteButton);

      player.addEventListener("ended", () => {
        stepVideo(1);
      });

      player.addEventListener("error", async () => {
        const currentVideo = videos.find((video) => video.id === currentId);
        if (!currentVideo || fallbackAttempted) return;
        fallbackAttempted = true;
        player.src = getFallbackSource(currentVideo.src);
        await safePlay(false);
      });

      document.addEventListener("keydown", async (event) => {
        showUi();

        if (handlePlaylistKeys(event)) return;
        if (isEditingTarget(event.target)) return;

        if (event.key === "Escape" && playlistVisible) {
          event.preventDefault();
          setPlaylistVisible(false, { returnFocus: true });
          return;
        }

        if (event.key === "ArrowRight" || event.key.toLowerCase() === "l") {
          event.preventDefault();
          forwardBtn.click();
        } else if (event.key === "ArrowLeft" || event.key.toLowerCase() === "j") {
          event.preventDefault();
          rewindBtn.click();
        } else if (event.key === " " || event.key.toLowerCase() === "k") {
          event.preventDefault();
          playBtn.click();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          muteBtn.click();
        } else if (event.key.toLowerCase() === "n") {
          event.preventDefault();
          nextBtn.click();
        } else if (event.key.toLowerCase() === "p") {
          event.preventDefault();
          prevBtn.click();
        } else if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          await toggleFullscreen();
        } else if (event.key.toLowerCase() === "c") {
          event.preventDefault();
          setPlaylistVisible(!playlistVisible, { focus: !playlistVisible });
        }
      });

      bindGestures();

      // Re-measure the viewport whenever fullscreen state changes; iOS needs a
      // delayed pass because the toolbars settle after the transition ends.
      const handleViewportChange = () => {
        showUi(true);
        scheduleInsetUpdate();
      };
      document.addEventListener("fullscreenchange", handleViewportChange);
      document.addEventListener("webkitfullscreenchange", handleViewportChange);
      player.addEventListener("webkitbeginfullscreen", () => showUi(true));
      player.addEventListener("webkitendfullscreen", () => {
        handleViewportChange();
        setTimeout(handleViewportChange, 300);
      });

      window.addEventListener("resize", scheduleInsetUpdate);
      window.addEventListener("orientationchange", scheduleInsetUpdate);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleInsetUpdate);
      }
    }

    async function init() {
      await loadData();
      bindEvents();
      renderPlaylist();
      updateMuteButton();
      setPlayButtonState(false);
      syncViewportHeight();
      updatePlayerInsets();

      const initialId = getInitialVideoIdFromUrl();
      const validInitialId =
        initialId && videos.some((video) => video.id === initialId)
          ? initialId
          : videos[0]?.id;

      if (validInitialId) {
        await loadVideo(validInitialId);
      }

      const full = await requestFullscreen();
      if (!full) armFullscreenOnGesture();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init, { once: true });
    } else {
      init();
    }
  </script>
</body>
</html>
