<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vagabond</title>
  <meta
    name="description"
    content="The ever-growing groove, soul & funk of house music playlist. Curated by Andrew Rios"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#111111",
            cream: "#FFF8F0",
            coral: "#E85D04",
            gold: "#FFB703",
          },
        },
      },
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      color: #fff8f0;
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "kern" 1;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .scene-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      object-fit: cover;
      z-index: 1;
      opacity: 0;
      transition: opacity 400ms ease;
    }

    .scene-video.loaded { opacity: 1; }

    .scene-mask {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(17,17,17,0.08) 0%,
        rgba(17,17,17,0.28) 52%,
        rgba(17,17,17,0.62) 100%
      );
    }

    .scene-fallback {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: none;
      place-items: center;
      padding: 1.5rem;
      text-align: center;
      color: rgba(255,248,240,0.76);
      background:
        radial-gradient(circle at 50% 30%, rgba(232,93,4,0.24), transparent 34%),
        #111111;
    }

    .scene-fallback.visible { display: grid; }

    .scene-fallback p {
      max-width: 28rem;
      font-size: 0.82rem;
      line-height: 1.5;
      letter-spacing: 0.02em;
    }

    /*
      z-index intentionally removed from #stage.
      Adding z-index here would create an isolated stacking context that
      traps the backdrop-filter compositor layer and buries fixed overlays
      (like #infoBtn) even when they have a higher z-index in the root context.
      gestureArea (z-10) and controls (z-20) handle their own stacking directly.
    */
    #stage {
      position: relative;
    }

    .controls {
      opacity: 1;
      transition: opacity 320ms ease;
      pointer-events: none;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    .controls.hidden { opacity: 0; }
    .controls .ui    { pointer-events: auto; }

    .glass {
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      background: rgba(23,23,25,0.56);
      border: 1px solid rgba(255,248,240,0.12);
      box-shadow: 0 16px 38px rgba(0,0,0,0.36);
      transform: translateZ(0);
    }

    .gloss {
      border: 1px solid rgba(255,248,240,0.25);
      background: linear-gradient(to bottom, rgba(255,248,240,0.15), rgba(255,248,240,0.06));
      color: #fff8f0;
      cursor: pointer;
      transition:
        transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 200ms ease;
    }

    .gloss:hover  { transform: scale(1.06); border-color: rgba(255,248,240,0.4); }
    .gloss:active { transform: scale(0.94); }

    .control-icon {
      width: 1.55rem;
      height: 1.55rem;
      overflow: visible;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-icon {
      width: 1.35rem;
      height: 1.35rem;
    }

    .btn-icon-nav {
      width: 1.1rem;
      height: 1.1rem;
    }

    .btn-icon-play {
      width: 1.2rem;
      height: 1.2rem;
    }

    .link-icon {
      width: 0.9rem;
      height: 0.9rem;
      fill: currentColor;
    }

    .shuffle-on {
      border-color: rgba(255,248,240,0.5);
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      position: relative;
      background: rgba(255,248,240,0.18);
      cursor: pointer;
      transition: height 180ms ease;
    }

    .progress:hover,
    .progress:focus-visible { height: 6px; }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255,248,240,0.72);
    }

    .progress-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%) scale(0);
      background: #fff8f0;
      pointer-events: none;
      transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress:hover .progress-thumb,
    .progress:focus-visible .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .track-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 340ms cubic-bezier(0.22, 1, 0.36, 1);
      contain: paint;
    }

    .track-panel.open { max-height: min(34svh, 310px); }

    .track-scroll {
      max-height: min(27svh, 250px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,248,240,0.18) transparent;
    }

    .track-scroll::-webkit-scrollbar       { width: 8px; }
    .track-scroll::-webkit-scrollbar-thumb { background: rgba(255,248,240,0.18); border-radius: 999px; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.5rem;
      padding: 0.45rem 0.625rem;
      cursor: pointer;
      color: rgba(255,248,240,0.7);
      transition: background 150ms ease, color 150ms ease;
      user-select: none;
    }

    .track-item:hover {
      background: rgba(255,248,240,0.07);
      color: rgba(255,248,240,0.9);
    }

    .track-active {
      background: rgba(255,248,240,0.1);
      color: rgba(255,248,240,0.97);
      box-shadow: inset 0 0 0 1px rgba(255,248,240,0.18);
    }

    .track-spotify-link {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 2px;
      color: rgba(255,248,240,0.26);
      text-decoration: none;
      transition: color 150ms ease, transform 150ms ease;
    }

    .track-spotify-link:hover {
      color: rgba(255,248,240,0.75);
      transform: scale(1.2);
    }

    .track-active .track-spotify-link {
      color: rgba(255,248,240,0.42);
    }

    .tnum { font-variant-numeric: tabular-nums; }

    .marquee-wrap { overflow: hidden; }

    .marquee-track {
      display: inline-flex;
      white-space: nowrap;
      font-size: 0.72rem;
      color: rgba(255,248,240,0.58);
      letter-spacing: 0.01em;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .marquee-track.scrolling {
      animation: marquee-scroll var(--marquee-dur, 14s) linear infinite;
    }

    .marquee-track.scrolling:hover { animation-play-state: paused; }

    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* Fixed top-right, last in DOM, highest z-index — always above the video and controls */
    .info-btn {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      right: max(1rem, env(safe-area-inset-right));
      z-index: 9999;
    }

    /*
      Popover anchored to top-right, below the info button.
      transform-origin: top right means the scale animation grows
      from the button's corner — matches iOS popover behaviour.
    */
    .info-panel {
      position: fixed;
      top: max(4.5rem, calc(env(safe-area-inset-top) + 3.5rem));
      right: max(1rem, env(safe-area-inset-right));
      z-index: 9998;
      width: min(calc(100vw - 2rem), 22rem);
      border-radius: 1.25rem;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform-origin: top right;
      transform: scale(0.92) translateY(-6px);
      transition:
        transform 360ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 260ms ease;
      user-select: none;
    }

    .info-panel.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <video id="sceneVideo" class="scene-video" autoplay muted playsinline loop preload="auto" poster="hero-poster.JPG" aria-hidden="true">
    <source src="boomerang.MP4" type="video/mp4" />
  </video>

  <div id="sceneFallback" class="scene-fallback" aria-live="polite">
    <p>The background video could not be loaded. Make sure <strong>boomerang.MP4</strong> is in the same folder as this page.</p>
  </div>

  <div class="scene-mask" aria-hidden="true"></div>

  <main id="stage" class="relative h-[100svh] w-full overflow-hidden">
    <div id="gestureArea" class="absolute inset-0 z-10"></div>

    <div id="controls" class="controls absolute inset-0 z-20 flex flex-col justify-end p-4 md:p-6">
      <section class="ui glass mx-0 rounded-3xl px-4 py-3 md:mx-auto md:w-full md:max-w-4xl md:p-5" aria-label="Audio controls">

        <!-- All five controls on one row, no wrapping -->
        <div class="flex items-center justify-center gap-2">

          <button id="prevBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Previous track">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon-nav" aria-hidden="true">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M19.496 4.136l-12 7a1 1 0 0 0 0 1.728l12 7a1 1 0 0 0 1.504 -.864v-14a1 1 0 0 0 -1.504 -.864z"/>
              <path d="M4 4a1 1 0 0 1 .993 .883l.007 .117v14a1 1 0 0 1 -1.993 .117l-.007 -.117v-14a1 1 0 0 1 1 -1z"/>
            </svg>
          </button>

          <button id="playPauseBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Play">
            <svg id="iconPlay" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon-play translate-x-[1px]" aria-hidden="true">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M6 4v16a1 1 0 0 0 1.524 .852l13 -8a1 1 0 0 0 0 -1.704l-13 -8a1 1 0 0 0 -1.524 .852z"/>
            </svg>
            <svg id="iconPause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon-play hidden" aria-hidden="true">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M9 4h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h2a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2z"/>
              <path d="M17 4h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h2a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2z"/>
            </svg>
          </button>

          <button id="nextBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Next track">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon-nav" aria-hidden="true">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M3 5v14a1 1 0 0 0 1.504 .864l12 -7a1 1 0 0 0 0 -1.728l-12 -7a1 1 0 0 0 -1.504 .864z"/>
              <path d="M20 4a1 1 0 0 1 .993 .883l.007 .117v14a1 1 0 0 1 -1.993 .117l-.007 -.117v-14a1 1 0 0 1 1 -1z"/>
            </svg>
          </button>

          <button id="shuffleBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Shuffle" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="btn-icon" aria-hidden="true">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M18 4l3 3l-3 3"/>
              <path d="M18 20l3 -3l-3 -3"/>
              <path d="M3 7h3a5 5 0 0 1 5 5a5 5 0 0 0 5 5h5"/>
              <path d="M3 17h3a5 5 0 0 0 5 -5a5 5 0 0 1 5 -5h5"/>
            </svg>
          </button>

          <button id="tracklistBtn" type="button" class="gloss inline-flex h-11 items-center justify-center rounded-full px-4 text-[0.62rem] font-medium uppercase tracking-[0.14em]" aria-expanded="false" aria-label="Toggle tracklist">
            Tracklist
          </button>

        </div>

        <div class="mt-3 flex items-center gap-2">
          <div id="marqueeWrap" class="marquee-wrap min-w-0 flex-1">
            <div id="marqueeTrack" class="marquee-track">
              <span id="nowPlayingText"></span>
              <span id="nowPlayingClone" class="hidden" aria-hidden="true"></span>
            </div>
          </div>
          <a id="spotifyBtn" href="#" target="_blank" rel="noopener noreferrer"
             class="gloss inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full"
             aria-label="Open in Spotify">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon" aria-hidden="true">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M12 5a1 1 0 0 1 0 2h-6a1 1 0 0 0 -1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1 -1v-6a1 1 0 0 1 2 0v6a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-10a3 3 0 0 1 3 -3zm3 -2h5l.075 .003l.126 .017l.111 .03l.111 .044l.098 .052l.096 .067l.09 .08q .054 .053 .097 .112l.071 .11l.054 .114l.035 .105l.03 .148l.006 .118v5a1 1 0 0 1 -2 0v-2.586l-7.293 7.293a1 1 0 0 1 -1.414 -1.414l7.291 -7.293h-2.584a1 1 0 0 1 0 -2"/>
            </svg>
          </a>
        </div>

        <div class="mt-3 grid grid-cols-[auto_1fr_auto] items-center gap-2">
          <span id="timeEl" class="tnum text-[0.68rem] text-cream/58">0:00</span>
          <div id="progressTrack" class="progress" role="slider" tabindex="0"
               aria-label="Playback progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressThumb" class="progress-thumb"></div>
          </div>
          <span id="durationEl" class="tnum text-[0.68rem] text-cream/58">0:00</span>
        </div>

        <div id="trackPanel" class="track-panel mt-3">
          <ol id="trackList" class="track-scroll space-y-0.5 px-0.5 pb-1 text-[0.76rem] leading-relaxed"></ol>
        </div>

      </section>
    </div>
  </main>

  <!--
    Info button and panel are last in <body> and carry z-index 9999/9998.
    Being last in DOM order AND highest in z-index means no stacking context
    on any earlier element can bury them — they are always above the video,
    the mask, and the audio controls.
  -->
  <button id="infoBtn" type="button" class="glass gloss info-btn inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="About this mix" aria-expanded="false">
    <svg viewBox="0 0 28 28" class="control-icon" aria-hidden="true">
      <circle cx="14" cy="14" r="9"/>
      <line x1="14" y1="12.5" x2="14" y2="19"/>
      <circle cx="14" cy="9.5" r="1.1" fill="currentColor" stroke="none"/>
    </svg>
  </button>

  <div id="infoPanel" class="info-panel glass" role="dialog" aria-label="About this mix">
    <p id="infoText" class="text-[0.82rem] leading-relaxed" style="color:rgba(255,248,240,0.76)"></p>
  </div>

  <script>
    // ================================================================
    //  PORTAL DATA  —  only edit this section
    // ================================================================
    const PORTAL = {
      mix: {
        title: "Vagabond",

        // Shown in the info panel (tap ⓘ top-right). Keep it short.
        description: "The ever-growing groove, soul & funk of house music playlist. Curated by Andrew Rios",

        // audio   → filename in your repo (e.g. song1.mp3)
        // title   → shown in tracklist and now-playing marquee
        // spotify → right-click track in Spotify → Share → Copy link to song
        //
        // • Songs play one after another automatically.
        // • Tap a row while playing  → switches to that song immediately.
        // • Tap a row while paused   → selects it; press play to start.
        // • To add a track  → copy any block below and paste it after.
        // • To remove a track → delete its { } block and the comma before it.
        tracklist: [
          {
            audio:   "song1.mp3",
            title:   "01. Go Back (feat. Julia Church) — John Summit, Sub Focus, Julia Church",
            spotify: "https://open.spotify.com/track/4CfcXnwLf2MUfnjCnqUMvj?si=b9m2GudBRG-XlVj6f7MUzw",
          },
          {
            audio:   "song2.mp3",
            title:   "02. What A Life — John Summit, Guz, Stevie Appleton",
            spotify: "https://open.spotify.com/track/1KbLVz3ZcdUOt2wBXqU2cG?si=TcvU_IkJSZ2y5rkBI1v_8w",
          },
          {
            audio:   "song3.mp3",
            title:   "03. Remember (John Summit Remix) — deadmau5, Kaskade, John Summit",
            spotify: "https://open.spotify.com/track/1d4EFJUZpnKhmfClsR2WWc?si=Cf6h0_L-QoOQ6g7nN7SK_Q",
          },
        ],
      },
    };
    // ================================================================
    //  END OF EDITABLE DATA
    // ================================================================

    const audio = new Audio();
    audio.preload = "metadata";

    let isPlaying          = false;
    let isScrubbing        = false;
    let controlsAreVisible = true;
    let tracklistOpen      = false;
    let isShuffling        = false;
    let infoOpen           = false;
    let hideTimer          = null;
    let activeTrack        = null;
    let displayList        = [];
    let progressRafPending = false;

    const sceneVideo      = document.getElementById("sceneVideo");
    const sceneFallback   = document.getElementById("sceneFallback");
    const stage           = document.getElementById("stage");
    const gestureArea     = document.getElementById("gestureArea");
    const controls        = document.getElementById("controls");
    const prevBtn         = document.getElementById("prevBtn");
    const playPauseBtn    = document.getElementById("playPauseBtn");
    const iconPlay        = document.getElementById("iconPlay");
    const iconPause       = document.getElementById("iconPause");
    const nextBtn         = document.getElementById("nextBtn");
    const shuffleBtn      = document.getElementById("shuffleBtn");
    const tracklistBtn    = document.getElementById("tracklistBtn");
    const spotifyBtn      = document.getElementById("spotifyBtn");
    const marqueeWrap     = document.getElementById("marqueeWrap");
    const marqueeTrack    = document.getElementById("marqueeTrack");
    const nowPlayingText  = document.getElementById("nowPlayingText");
    const nowPlayingClone = document.getElementById("nowPlayingClone");
    const progressTrack   = document.getElementById("progressTrack");
    const progressFill    = document.getElementById("progressFill");
    const progressThumb   = document.getElementById("progressThumb");
    const timeEl          = document.getElementById("timeEl");
    const durationEl      = document.getElementById("durationEl");
    const trackPanel      = document.getElementById("trackPanel");
    const trackList       = document.getElementById("trackList");
    const infoBtn         = document.getElementById("infoBtn");
    const infoPanel       = document.getElementById("infoPanel");
    const infoText        = document.getElementById("infoText");

    function formatTime(s) {
      if (!Number.isFinite(s) || s < 0) return "0:00";
      return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, "0")}`;
    }

    function clearHideTimer() {
      if (!hideTimer) return;
      window.clearTimeout(hideTimer);
      hideTimer = null;
    }

    function setControlsVisible(visible) {
      controlsAreVisible = visible;
      controls.classList.toggle("hidden", !visible);
    }

    function scheduleAutoHide() {
      clearHideTimer();
      if (!isPlaying || tracklistOpen) return;
      hideTimer = window.setTimeout(() => setControlsVisible(false), 1800);
    }

    function revealControls() {
      setControlsVisible(true);
      scheduleAutoHide();
    }

    function setTracklistOpen(open) {
      tracklistOpen = open;
      trackPanel.classList.toggle("open", open);
      tracklistBtn.setAttribute("aria-expanded", String(open));
      tracklistBtn.textContent = open ? "Hide List" : "Tracklist";
      if (open) revealControls(); else scheduleAutoHide();
    }

    function setInfoOpen(open) {
      infoOpen = open;
      infoPanel.classList.toggle("open", open);
      infoBtn.setAttribute("aria-expanded", String(open));
    }

    function updatePlayState(playing) {
      isPlaying = playing;
      iconPlay.classList.toggle("hidden", playing);
      iconPause.classList.toggle("hidden", !playing);
      playPauseBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
      if (playing) {
        scheduleAutoHide();
      } else {
        clearHideTimer();
        setControlsVisible(true);
      }
      updateMediaSession();
    }

    function _doUpdateProgressUI() {
      progressRafPending = false;
      const dur = audio.duration;
      const now = audio.currentTime;
      if (!Number.isFinite(dur) || dur <= 0) {
        progressFill.style.width = "0%";
        progressThumb.style.left = "0%";
        progressTrack.setAttribute("aria-valuenow", "0");
        progressTrack.setAttribute("aria-valuetext", "0:00 of 0:00");
        timeEl.textContent = "0:00";
        durationEl.textContent = "0:00";
        return;
      }
      const pct = Math.min(100, Math.max(0, (now / dur) * 100));
      progressFill.style.width = `${pct}%`;
      progressThumb.style.left = `${pct}%`;
      progressTrack.setAttribute("aria-valuenow", String(Math.round(pct)));
      progressTrack.setAttribute("aria-valuetext", `${formatTime(now)} of ${formatTime(dur)}`);
      timeEl.textContent = formatTime(now);
      durationEl.textContent = formatTime(dur);
    }

    function updateProgressUI() {
      if (progressRafPending) return;
      progressRafPending = true;
      requestAnimationFrame(_doUpdateProgressUI);
    }

    function seekByClientX(clientX) {
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
      const rect = progressTrack.getBoundingClientRect();
      audio.currentTime = (Math.min(Math.max(clientX - rect.left, 0), rect.width) / rect.width) * audio.duration;
      updateProgressUI();
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildDisplayList() {
      displayList = isShuffling ? shuffleArray(PORTAL.mix.tracklist) : [...PORTAL.mix.tracklist];
    }

    function spotifyHref(track) {
      return track.spotify && track.spotify !== "PASTE_SPOTIFY_LINK_HERE" ? track.spotify : "#";
    }

    function renderTracklist() {
      trackList.innerHTML = "";
      displayList.forEach((track) => {
        const li = document.createElement("li");
        li.className = "track-item" + (track === activeTrack ? " track-active" : "");
        li.addEventListener("click", () => selectTrack(track));

        const titleSpan = document.createElement("span");
        titleSpan.className = "flex-1 min-w-0 truncate";
        titleSpan.textContent = track.title;
        li.appendChild(titleSpan);

        const link = document.createElement("a");
        link.href = spotifyHref(track);
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.className = "track-spotify-link";
        link.setAttribute("aria-label", "Open in Spotify");
        link.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="link-icon" aria-hidden="true"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 5a1 1 0 0 1 0 2h-6a1 1 0 0 0 -1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1 -1v-6a1 1 0 0 1 2 0v6a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-10a3 3 0 0 1 3 -3zm3 -2h5l.075 .003l.126 .017l.111 .03l.111 .044l.098 .052l.096 .067l.09 .08q .054 .053 .097 .112l.071 .11l.054 .114l.035 .105l.03 .148l.006 .118v5a1 1 0 0 1 -2 0v-2.586l-7.293 7.293a1 1 0 0 1 -1.414 -1.414l7.291 -7.293h-2.584a1 1 0 0 1 0 -2"/></svg>`;
        link.addEventListener("click", (e) => e.stopPropagation());
        li.appendChild(link);

        trackList.appendChild(li);
      });
    }

    function selectTrack(track, forcePlay = false) {
      const wasPlaying = !audio.paused;
      activeTrack = track;
      audio.src = track.audio;
      audio.load();
      nowPlayingText.textContent = track.title;
      spotifyBtn.href = spotifyHref(track);
      refreshMarquee();
      renderTracklist();
      updateMediaSession();
      if (wasPlaying || forcePlay) playAudio();
    }

    function advanceToNext() {
      const idx = displayList.indexOf(activeTrack);
      if (idx >= 0 && idx < displayList.length - 1) {
        selectTrack(displayList[idx + 1], true);
      } else {
        updatePlayState(false);
      }
    }

    function setShuffling(active) {
      isShuffling = active;
      shuffleBtn.setAttribute("aria-pressed", String(active));
      shuffleBtn.classList.toggle("shuffle-on", active);
      buildDisplayList();
      renderTracklist();
      revealControls();
    }

    function refreshMarquee() {
      marqueeTrack.classList.remove("scrolling");
      marqueeTrack.style.willChange = "";
      nowPlayingClone.classList.add("hidden");
      nowPlayingText.style.paddingRight = "";
      nowPlayingClone.style.paddingRight = "";

      requestAnimationFrame(() => {
        const wrapW = marqueeWrap.offsetWidth;
        const rawW  = nowPlayingText.offsetWidth;
        if (rawW <= wrapW) return;

        const GAP = 56;
        nowPlayingText.style.paddingRight = `${GAP}px`;
        nowPlayingClone.textContent = nowPlayingText.textContent;
        nowPlayingClone.style.paddingRight = `${GAP}px`;
        nowPlayingClone.classList.remove("hidden");

        requestAnimationFrame(() => {
          const dur = Math.max(6, nowPlayingText.offsetWidth / 50);
          marqueeTrack.style.setProperty("--marquee-dur", `${dur}s`);
          marqueeTrack.style.willChange = "transform";
          marqueeTrack.classList.add("scrolling");
        });
      });
    }

    function initSceneVideo() {
      const showVideo    = () => { sceneFallback.classList.remove("visible"); sceneVideo.classList.add("loaded"); };
      const showFallback = () => { sceneVideo.classList.remove("loaded"); sceneFallback.classList.add("visible"); };

      function playSceneVideo() {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          sceneVideo.pause();
          if (sceneVideo.readyState > 0) showVideo();
          return;
        }
        // iOS Safari can clear the video from memory after ~60s in background.
        // If readyState dropped to 0, reload the source before attempting play.
        if (sceneVideo.readyState === 0) {
          sceneVideo.addEventListener("canplay", () => {
            sceneVideo.play().catch(() => {});
          }, { once: true });
          sceneVideo.load();
          return;
        }
        const p = sceneVideo.play();
        if (p) p.catch(() => { if (sceneVideo.readyState > 0) showVideo(); else showFallback(); });
      }

      sceneVideo.loop = true;
      sceneVideo.addEventListener("loadeddata", showVideo, { once: true });
      sceneVideo.addEventListener("canplay", playSceneVideo, { once: true });
      sceneVideo.addEventListener("error", showFallback);

      // Resume after tab/app switch — 150ms delay lets the browser finish restoring context
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          sceneVideo.pause();
        } else {
          setTimeout(playSceneVideo, 150);
        }
      });

      // Resume after browser restores page from bfcache (back/forward navigation)
      window.addEventListener("pageshow", (e) => {
        if (e.persisted) setTimeout(playSceneVideo, 150);
      });

      // Health check: if the page is visible and the video has stopped unexpectedly, restart it
      setInterval(() => {
        if (!document.hidden && sceneVideo.paused && !sceneVideo.error) {
          playSceneVideo();
        }
      }, 3000);

      if (sceneVideo.readyState > 0) showVideo();
      playSceneVideo();
    }

    function updateMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title:  activeTrack ? activeTrack.title : PORTAL.mix.title,
        artist: "Mixed by Andrew Rios",
        album:  PORTAL.mix.title,
      });
      navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
    }

    async function playAudio() {
      try { await audio.play(); updatePlayState(true); }
      catch (_) { updatePlayState(false); }
    }

    function togglePlayPause() {
      if (audio.paused) playAudio(); else audio.pause();
    }

    function initMix(autoplay = false) {
      document.title = PORTAL.mix.title;
      if (PORTAL.mix.description) infoText.textContent = PORTAL.mix.description;
      buildDisplayList();
      if (displayList.length > 0) selectTrack(displayList[0]);
      updateProgressUI();
      if (autoplay) playAudio(); else updatePlayState(false);
      revealControls();
    }

    function bindEvents() {
      gestureArea.addEventListener("pointerdown", () => {
        if (infoOpen) { setInfoOpen(false); return; }
        if (!controlsAreVisible) {
          revealControls();
        } else if (isPlaying && !tracklistOpen) {
          setControlsVisible(false);
          clearHideTimer();
        } else {
          revealControls();
        }
      });

      infoBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        setInfoOpen(!infoOpen);
        revealControls();
      });

      infoPanel.addEventListener("click", (e) => {
        e.stopPropagation();
        setInfoOpen(false);
      });

      stage.addEventListener("pointermove", () => {
        if (!controlsAreVisible && isPlaying) return;
        if (isPlaying) scheduleAutoHide();
      });

      playPauseBtn.addEventListener("click", () => { togglePlayPause(); revealControls(); });

      prevBtn.addEventListener("click", () => {
        const idx = displayList.indexOf(activeTrack);
        if (idx > 0) selectTrack(displayList[idx - 1], isPlaying);
        revealControls();
      });

      nextBtn.addEventListener("click", () => {
        const idx = displayList.indexOf(activeTrack);
        if (idx >= 0 && idx < displayList.length - 1) selectTrack(displayList[idx + 1], isPlaying);
        revealControls();
      });

      shuffleBtn.addEventListener("click", () => setShuffling(!isShuffling));
      tracklistBtn.addEventListener("click", () => setTracklistOpen(!tracklistOpen));
      spotifyBtn.addEventListener("click", () => revealControls());

      progressTrack.addEventListener("pointerdown", (e) => {
        isScrubbing = true;
        seekByClientX(e.clientX);
        progressTrack.setPointerCapture(e.pointerId);
      });
      progressTrack.addEventListener("pointermove", (e) => { if (isScrubbing) seekByClientX(e.clientX); });
      progressTrack.addEventListener("pointerup", () => { isScrubbing = false; });

      progressTrack.addEventListener("keydown", (e) => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        const step = Math.max(1, audio.duration * 0.02);
        if      (e.key === "ArrowLeft")  { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - step); }
        else if (e.key === "ArrowRight") { e.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + step); }
        else if (e.key === "Home")       { e.preventDefault(); audio.currentTime = 0; }
        else if (e.key === "End")        { e.preventDefault(); audio.currentTime = audio.duration; }
        updateProgressUI();
      });

      audio.addEventListener("loadedmetadata", updateProgressUI);
      audio.addEventListener("timeupdate",     updateProgressUI);
      audio.addEventListener("play",           () => updatePlayState(true));
      audio.addEventListener("pause",          () => updatePlayState(false));
      audio.addEventListener("ended",          advanceToNext);

      document.addEventListener("keydown", (e) => {
        if (e.target.closest("input, textarea, select, [contenteditable], button, a")) return;
        if      (e.key === " ")                    { e.preventDefault(); togglePlayPause(); }
        else if (e.key.toLowerCase() === "s")      { e.preventDefault(); setShuffling(!isShuffling); }
        else if (e.key.toLowerCase() === "t")      { e.preventDefault(); setTracklistOpen(!tracklistOpen); }
        revealControls();
      });

      window.addEventListener("resize", refreshMarquee);
    }

    function initMediaSessionActions() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.setActionHandler("play",  playAudio);
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("previoustrack", () => {
        const idx = displayList.indexOf(activeTrack);
        if (idx > 0) selectTrack(displayList[idx - 1]);
      });
      navigator.mediaSession.setActionHandler("nexttrack", () => {
        const idx = displayList.indexOf(activeTrack);
        if (idx < displayList.length - 1) selectTrack(displayList[idx + 1]);
      });
      navigator.mediaSession.setActionHandler("seekbackward", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("seekforward", () => {
        if (!Number.isFinite(audio.duration)) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
      });
    }

    function init() {
      initSceneVideo();
      bindEvents();
      initMediaSessionActions();
      initMix(false);
      setTracklistOpen(false);
      setControlsVisible(true);
    }

    init();
  </script>
</body>
</html>
