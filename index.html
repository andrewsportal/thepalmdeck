<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vagabond</title>
  <meta
    name="description"
    content="Get behind the decks. House, soul &amp; funk — the ever-growing playlist, curated by Andrew Rios."
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#111111",
            cream: "#FFF8F0",
            coral: "#E85D04",
            gold: "#FFB703",
          },
        },
      },
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      color: #fff8f0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .scene-poster,
    .scene-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scene-poster {
      background-image: url("hero-poster.JPG");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .scene-video {
      object-fit: cover;
      z-index: 1;
      transition: opacity 400ms ease;
    }

    .scene-mask {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(17, 17, 17, 0.08) 0%,
        rgba(17, 17, 17, 0.28) 52%,
        rgba(17, 17, 17, 0.62) 100%
      );
    }

    #stage {
      position: relative;
      z-index: 10;
    }

    .mixer-credit {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(255, 248, 240, 0.32);
      margin-top: 0.45rem;
      margin-bottom: 0.5rem;
    }

    .controls {
      opacity: 1;
      transition: opacity 320ms ease;
      pointer-events: none;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    .controls.hidden { opacity: 0; }
    .controls .ui    { pointer-events: auto; }

    .glass {
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      background: rgba(23, 23, 25, 0.56);
      border: 1px solid rgba(255, 248, 240, 0.12);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.36);
      transform: translateZ(0);
    }

    .gloss {
      border: 1px solid rgba(255, 248, 240, 0.25);
      background: linear-gradient(to bottom, rgba(255, 248, 240, 0.15), rgba(255, 248, 240, 0.06));
      color: #fff8f0;
      cursor: pointer;
      transition:
        transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 200ms ease;
    }

    .gloss:hover  { transform: scale(1.06); border-color: rgba(255, 248, 240, 0.4); }
    .gloss:active { transform: scale(0.94); }

    .shuffle-on {
      border-color: rgba(255, 248, 240, 0.5);
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      position: relative;
      background: rgba(255, 248, 240, 0.18);
      cursor: pointer;
      transition: height 180ms ease;
    }

    .progress:hover,
    .progress:focus-visible { height: 6px; }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255, 248, 240, 0.72);
    }

    .progress-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%) scale(0);
      background: #fff8f0;
      pointer-events: none;
      transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress:hover .progress-thumb,
    .progress:focus-visible .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .track-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 340ms cubic-bezier(0.22, 1, 0.36, 1);
      contain: paint;
    }

    .track-panel.open { max-height: min(34svh, 310px); }

    .track-scroll {
      max-height: min(27svh, 250px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 248, 240, 0.18) transparent;
    }

    .track-scroll::-webkit-scrollbar       { width: 8px; }
    .track-scroll::-webkit-scrollbar-thumb { background: rgba(255, 248, 240, 0.18); border-radius: 999px; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.5rem;
      padding: 0.375rem 0.5rem;
      cursor: pointer;
      color: rgba(255, 248, 240, 0.7);
      transition: background 150ms ease, color 150ms ease;
      user-select: none;
    }

    .track-item:hover {
      background: rgba(255, 248, 240, 0.07);
      color: rgba(255, 248, 240, 0.9);
    }

    .track-active {
      background: rgba(255, 248, 240, 0.1);
      color: rgba(255, 248, 240, 0.97);
      box-shadow: inset 0 0 0 1px rgba(255, 248, 240, 0.18);
    }

    .track-spotify-link {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 2px;
      color: rgba(255, 248, 240, 0.26);
      text-decoration: none;
      transition: color 150ms ease, transform 150ms ease;
    }

    .track-spotify-link:hover {
      color: rgba(255, 248, 240, 0.75);
      transform: scale(1.2);
    }

    .track-active .track-spotify-link {
      color: rgba(255, 248, 240, 0.42);
    }

    .tnum { font-variant-numeric: tabular-nums; }

    .marquee-wrap { overflow: hidden; }

    .marquee-track {
      display: inline-flex;
      white-space: nowrap;
      font-size: 0.72rem;
      color: rgba(255, 248, 240, 0.58);
      letter-spacing: 0.01em;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .marquee-track.scrolling {
      animation: marquee-scroll var(--marquee-dur, 14s) linear infinite;
    }

    .marquee-track.scrolling:hover { animation-play-state: paused; }

    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="scenePoster" class="scene-poster" aria-hidden="true"></div>
  <video id="sceneVideo" class="scene-video" muted playsinline preload="auto" poster="hero-poster.JPG" aria-hidden="true">
    <source src="thepalmdeck.MP4" type="video/mp4" />
  </video>
  <div class="scene-mask" aria-hidden="true"></div>

  <main id="stage" class="relative h-[100svh] w-full overflow-hidden">
    <div id="gestureArea" class="absolute inset-0 z-10"></div>

    <div id="controls" class="controls absolute inset-0 z-20 flex flex-col justify-end p-4 md:p-6">

      <section class="ui glass mx-0 rounded-3xl px-3 py-2.5 md:mx-auto md:w-full md:max-w-4xl md:p-4" aria-label="Audio controls">

        <div class="flex flex-wrap items-center justify-center gap-2">

          <button id="rewindBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Rewind 10 seconds">
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M11 19a7 7 0 1 1 5.57-11.24"></path>
              <path d="M12 8H8v4"></path>
              <path d="M8 8l5 5"></path>
            </svg>
          </button>

          <button id="playPauseBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Play">
            <svg id="iconPlay" viewBox="0 0 24 24" class="h-[18px] w-[18px] translate-x-[1px]" fill="#fff8f0" aria-hidden="true">
              <path d="M8 5v14l11-7z"></path>
            </svg>
            <svg id="iconPause" viewBox="0 0 24 24" class="hidden h-[18px] w-[18px]" fill="#fff8f0" aria-hidden="true">
              <path d="M7 5h4v14H7zm6 0h4v14h-4z"></path>
            </svg>
          </button>

          <button id="forwardBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Forward 10 seconds">
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M13 19a7 7 0 1 0-5.57-11.24"></path>
              <path d="M12 8h4v4"></path>
              <path d="M16 8l-5 5"></path>
            </svg>
          </button>

          <button id="shuffleBtn" type="button" class="gloss inline-flex h-11 w-11 items-center justify-center rounded-full" aria-label="Shuffle" aria-pressed="false">
            <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M16 3h5v5"></path>
              <path d="M4 20 21 3"></path>
              <path d="M21 16v5h-5"></path>
              <path d="M15 15l5.1 5.1"></path>
              <path d="M4 4l5 5"></path>
            </svg>
          </button>

          <button id="tracklistBtn" type="button" class="gloss inline-flex h-10 items-center justify-center rounded-full px-4 text-[0.62rem] font-medium uppercase tracking-[0.14em]" aria-expanded="false" aria-label="Toggle tracklist">
            Tracklist
          </button>

        </div>

        <div class="mt-2 flex items-center gap-2">
          <div id="marqueeWrap" class="marquee-wrap min-w-0 flex-1">
            <div id="marqueeTrack" class="marquee-track">
              <span id="nowPlayingText"></span>
              <span id="nowPlayingClone" class="hidden" aria-hidden="true"></span>
            </div>
          </div>
          <a id="spotifyBtn" href="#" target="_blank" rel="noopener noreferrer"
             class="gloss inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full"
             aria-label="Open in Spotify">
            <svg viewBox="0 0 24 24" class="h-[15px] w-[15px]" fill="currentColor" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 0 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 0 1 .207.857zm1.223-2.72a.78.78 0 0 1-1.072.257C14.087 12.18 11.02 11.73 7.3 12.7a.78.78 0 0 1-.386-1.51c4.162-1.065 7.538-.604 10.638 1.44a.78.78 0 0 1 .257 1.074zm.105-2.832a.935.935 0 0 1-1.285.308C13.9 9.45 9.675 9.17 5.535 10.29a.935.935 0 0 1-.468-1.81c4.581-1.186 9.256-.95 12.75 1.1a.935.935 0 0 1 .308 1.286z"/>
            </svg>
          </a>
        </div>

        <div class="mt-2 grid grid-cols-[auto_1fr_auto] items-center gap-2">
          <span id="timeEl" class="tnum text-[0.68rem] text-cream/58">0:00</span>
          <div id="progressTrack" class="progress" role="slider" tabindex="0"
               aria-label="Playback progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressThumb" class="progress-thumb"></div>
          </div>
          <span id="durationEl" class="tnum text-[0.68rem] text-cream/58">0:00</span>
        </div>

        <div id="trackPanel" class="track-panel mt-3">
          <ol id="trackList" class="track-scroll space-y-1 text-[0.76rem] leading-relaxed"></ol>
        </div>

        <p class="mixer-credit">Mixed by Andrew Rios</p>

      </section>
    </div>
  </main>

  <script>
    // ================================================================
    //  PORTAL DATA  —  only edit this section
    // ================================================================
    const PORTAL = {
      fallbackPoster: "hero-poster.JPG",
      mix: {
        title: "Vagabond",

        // ── TRACKLIST ──────────────────────────────────────────────
        //
        //  audio   → filename in your repo. Name your files song1, song2, song3…
        //            and include the extension: song1.mp3 / song1.flac / song1.aac
        //            Any format the browser supports works (mp3, aac, flac, m4a, wav).
        //  title   → text shown in the tracklist and the now-playing marquee
        //  spotify → in Spotify: right-click a song → Share → Copy link to song
        //
        //  • Songs play one after another automatically.
        //  • Tap a row while playing  → switches to that song immediately.
        //  • Tap a row while paused   → selects it; press play to start.
        //  • When shuffled, auto-advance follows the shuffled queue order.
        //  • Lock-screen previous/next controls skip between tracks.
        //  • To add a track  → copy any block below and paste it after.
        //  • To remove a track → delete its { } block and the comma before it.
        //
        // ──────────────────────────────────────────────────────────
        tracklist: [
          {
            audio:   "song1.mp3",
            title:   "01. John Summit, Sub Focus, Julia Church – Go Back (feat. Julia Church)",
            spotify: "https://open.spotify.com/track/4CfcXnwLf2MUfnjCnqUMvj?si=b9m2GudBRG-XlVj6f7MUzw",
          },
          {
            audio:   "song2.mp3",
            title:   "02. John Summit, Guz, Stevie Appleton – What A Life",
            spotify: "https://open.spotify.com/track/1KbLVz3ZcdUOt2wBXqU2cG?si=TcvU_IkJSZ2y5rkBI1v_8w",
          },
          {
            audio:   "song3.mp3",
            title:   "03. deadmau5, Kaskade, John Summit – Remember (John Summit Remix)",
            spotify: "https://open.spotify.com/track/1d4EFJUZpnKhmfClsR2WWc?si=Cf6h0_L-QoOQ6g7nN7SK_Q",
          },
        ],
      },
    };
    // ================================================================
    //  END OF EDITABLE DATA  —  no need to change anything below
    // ================================================================

    const audio = new Audio();
    audio.preload = "metadata";

    let isPlaying          = false;
    let isScrubbing        = false;
    let controlsAreVisible = true;
    let tracklistOpen      = false;
    let isShuffling        = false;
    let hideTimer          = null;
    let activeTrack        = null;
    let displayList        = [];
    let progressRafPending = false;

    const scenePoster = document.getElementById("scenePoster");
    const sceneVideo  = document.getElementById("sceneVideo");
    const stage              = document.getElementById("stage");
    const gestureArea        = document.getElementById("gestureArea");
    const controls           = document.getElementById("controls");
    const rewindBtn          = document.getElementById("rewindBtn");
    const playPauseBtn       = document.getElementById("playPauseBtn");
    const iconPlay           = document.getElementById("iconPlay");
    const iconPause          = document.getElementById("iconPause");
    const forwardBtn         = document.getElementById("forwardBtn");
    const shuffleBtn         = document.getElementById("shuffleBtn");
    const tracklistBtn       = document.getElementById("tracklistBtn");
    const spotifyBtn         = document.getElementById("spotifyBtn");
    const marqueeWrap        = document.getElementById("marqueeWrap");
    const marqueeTrack       = document.getElementById("marqueeTrack");
    const nowPlayingText     = document.getElementById("nowPlayingText");
    const nowPlayingClone    = document.getElementById("nowPlayingClone");
    const progressTrack      = document.getElementById("progressTrack");
    const progressFill       = document.getElementById("progressFill");
    const progressThumb      = document.getElementById("progressThumb");
    const timeEl             = document.getElementById("timeEl");
    const durationEl         = document.getElementById("durationEl");
    const trackPanel         = document.getElementById("trackPanel");
    const trackList          = document.getElementById("trackList");

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function clearHideTimer() {
      if (!hideTimer) return;
      window.clearTimeout(hideTimer);
      hideTimer = null;
    }

    function setControlsVisible(visible) {
      controlsAreVisible = visible;
      controls.classList.toggle("hidden", !visible);
    }

    function scheduleAutoHide() {
      clearHideTimer();
      if (!isPlaying || tracklistOpen) return;
      hideTimer = window.setTimeout(() => setControlsVisible(false), 1800);
    }

    function revealControls() {
      setControlsVisible(true);
      scheduleAutoHide();
    }

    function setTracklistOpen(open) {
      tracklistOpen = open;
      trackPanel.classList.toggle("open", open);
      tracklistBtn.setAttribute("aria-expanded", String(open));
      tracklistBtn.textContent = open ? "Hide List" : "Tracklist";
      if (open) revealControls(); else scheduleAutoHide();
    }

    function updatePlayState(playing) {
      isPlaying = playing;
      iconPlay.classList.toggle("hidden", playing);
      iconPause.classList.toggle("hidden", !playing);
      playPauseBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
      if (playing) {
        scheduleAutoHide();
      } else {
        clearHideTimer();
        setControlsVisible(true);
      }
      updateMediaSession();
    }

    function _doUpdateProgressUI() {
      progressRafPending = false;
      const duration = audio.duration;
      const now = audio.currentTime;
      if (!Number.isFinite(duration) || duration <= 0) {
        progressFill.style.width = "0%";
        progressThumb.style.left = "0%";
        progressTrack.setAttribute("aria-valuenow", "0");
        progressTrack.setAttribute("aria-valuetext", "0:00 of 0:00");
        timeEl.textContent = "0:00";
        durationEl.textContent = "0:00";
        return;
      }
      const pct = Math.min(100, Math.max(0, (now / duration) * 100));
      progressFill.style.width = `${pct}%`;
      progressThumb.style.left = `${pct}%`;
      progressTrack.setAttribute("aria-valuenow", String(Math.round(pct)));
      progressTrack.setAttribute("aria-valuetext", `${formatTime(now)} of ${formatTime(duration)}`);
      timeEl.textContent = formatTime(now);
      durationEl.textContent = formatTime(duration);
    }

    function updateProgressUI() {
      if (progressRafPending) return;
      progressRafPending = true;
      requestAnimationFrame(_doUpdateProgressUI);
    }

    function seekByClientX(clientX) {
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
      const rect = progressTrack.getBoundingClientRect();
      const x = Math.min(Math.max(clientX - rect.left, 0), rect.width);
      audio.currentTime = (x / rect.width) * audio.duration;
      updateProgressUI();
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildDisplayList() {
      displayList = isShuffling
        ? shuffleArray(PORTAL.mix.tracklist)
        : [...PORTAL.mix.tracklist];
    }

    function spotifyHref(track) {
      return track.spotify && track.spotify !== "PASTE_SPOTIFY_LINK_HERE"
        ? track.spotify
        : "#";
    }

    function renderTracklist() {
      trackList.innerHTML = "";
      displayList.forEach((track) => {
        const li = document.createElement("li");
        li.className = "track-item" + (track === activeTrack ? " track-active" : "");
        li.addEventListener("click", () => selectTrack(track));

        const titleSpan = document.createElement("span");
        titleSpan.className = "flex-1 min-w-0 truncate";
        titleSpan.textContent = track.title;
        li.appendChild(titleSpan);

        const link = document.createElement("a");
        link.href = spotifyHref(track);
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.className = "track-spotify-link";
        link.setAttribute("aria-label", "Open in Spotify");
        link.innerHTML = `<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 0 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 0 1 .207.857zm1.223-2.72a.78.78 0 0 1-1.072.257C14.087 12.18 11.02 11.73 7.3 12.7a.78.78 0 0 1-.386-1.51c4.162-1.065 7.538-.604 10.638 1.44a.78.78 0 0 1 .257 1.074zm.105-2.832a.935.935 0 0 1-1.285.308C13.9 9.45 9.675 9.17 5.535 10.29a.935.935 0 0 1-.468-1.81c4.581-1.186 9.256-.95 12.75 1.1a.935.935 0 0 1 .308 1.286z"/></svg>`;
        link.addEventListener("click", (e) => e.stopPropagation());
        li.appendChild(link);

        trackList.appendChild(li);
      });
    }

    function selectTrack(track, forcePlay = false) {
      const wasPlaying = !audio.paused;
      activeTrack = track;

      audio.src = track.audio;
      audio.load();

      nowPlayingText.textContent = track.title;
      spotifyBtn.href = spotifyHref(track);
      refreshMarquee();
      renderTracklist();
      updateMediaSession();

      if (wasPlaying || forcePlay) playAudio();
    }

    function advanceToNext() {
      const idx = displayList.indexOf(activeTrack);
      if (idx >= 0 && idx < displayList.length - 1) {
        selectTrack(displayList[idx + 1], true);
      } else {
        updatePlayState(false);
      }
    }

    function setShuffling(active) {
      isShuffling = active;
      shuffleBtn.setAttribute("aria-pressed", String(active));
      shuffleBtn.classList.toggle("shuffle-on", active);
      buildDisplayList();
      renderTracklist();
      revealControls();
    }

    function refreshMarquee() {
      marqueeTrack.classList.remove("scrolling");
      marqueeTrack.style.willChange = "";
      nowPlayingClone.classList.add("hidden");
      nowPlayingText.style.paddingRight = "";
      nowPlayingClone.style.paddingRight = "";

      requestAnimationFrame(() => {
        const wrapW = marqueeWrap.offsetWidth;
        const rawW  = nowPlayingText.offsetWidth;
        if (rawW <= wrapW) return;

        const GAP = 56;
        nowPlayingText.style.paddingRight = `${GAP}px`;
        nowPlayingClone.textContent = nowPlayingText.textContent;
        nowPlayingClone.style.paddingRight = `${GAP}px`;
        nowPlayingClone.classList.remove("hidden");

        requestAnimationFrame(() => {
          const spanW = nowPlayingText.offsetWidth;
          const dur   = Math.max(6, spanW / 50);
          marqueeTrack.style.setProperty("--marquee-dur", `${dur}s`);
          marqueeTrack.style.willChange = "transform";
          marqueeTrack.classList.add("scrolling");
        });
      });
    }

    function setScenePoster() {
      scenePoster.style.backgroundImage = `url("${PORTAL.fallbackPoster}")`;
    }

    function initBoomerang() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      sceneVideo.pause();
      sceneVideo.currentTime = 0;

      let direction = 1;
      let lastTs    = null;
      let running   = false;

      function tick(ts) {
        if (!running) return;
        if (lastTs !== null && isFinite(sceneVideo.duration) && sceneVideo.duration > 0) {
          const delta = Math.min((ts - lastTs) / 1000, 0.1);
          const next  = sceneVideo.currentTime + direction * delta;
          if (next >= sceneVideo.duration) {
            sceneVideo.currentTime = sceneVideo.duration;
            direction = -1;
          } else if (next <= 0) {
            sceneVideo.currentTime = 0;
            direction = 1;
          } else {
            sceneVideo.currentTime = next;
          }
        }
        lastTs = ts;
        requestAnimationFrame(tick);
      }

      function start() {
        running = true;
        lastTs  = null;
        requestAnimationFrame(tick);
      }

      function stop() { running = false; }

      if (sceneVideo.readyState >= 3) {
        start();
      } else {
        sceneVideo.addEventListener("canplay", start, { once: true });
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) { stop(); } else { start(); }
      });

      sceneVideo.addEventListener("error", () => {
        stop();
        sceneVideo.style.opacity = "0";
      });
    }

    function updateMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title:  activeTrack ? activeTrack.title : PORTAL.mix.title,
        artist: "Mixed by Andrew Rios",
        album:  PORTAL.mix.title,
      });
      navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
    }

    async function playAudio() {
      try { await audio.play(); updatePlayState(true); }
      catch (_) { updatePlayState(false); }
    }

    function togglePlayPause() {
      if (audio.paused) playAudio(); else audio.pause();
    }

    function initMix(autoplay = false) {
      document.title = PORTAL.mix.title;
      buildDisplayList();
      if (displayList.length > 0) selectTrack(displayList[0]);
      updateProgressUI();
      if (autoplay) playAudio(); else updatePlayState(false);
      revealControls();
    }

    function bindEvents() {
      gestureArea.addEventListener("pointerdown", () => {
        if (!controlsAreVisible) {
          revealControls();
        } else if (isPlaying && !tracklistOpen) {
          setControlsVisible(false);
          clearHideTimer();
        } else {
          revealControls();
        }
      });

      stage.addEventListener("pointermove", () => {
        if (!controlsAreVisible && isPlaying) return;
        if (isPlaying) scheduleAutoHide();
      });

      playPauseBtn.addEventListener("click", () => { togglePlayPause(); revealControls(); });

      rewindBtn.addEventListener("click", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
        revealControls();
      });

      forwardBtn.addEventListener("click", () => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
        revealControls();
      });

      shuffleBtn.addEventListener("click", () => setShuffling(!isShuffling));

      tracklistBtn.addEventListener("click", () => setTracklistOpen(!tracklistOpen));

      spotifyBtn.addEventListener("click", () => revealControls());

      progressTrack.addEventListener("pointerdown", (e) => {
        isScrubbing = true;
        seekByClientX(e.clientX);
        progressTrack.setPointerCapture(e.pointerId);
      });
      progressTrack.addEventListener("pointermove", (e) => {
        if (isScrubbing) seekByClientX(e.clientX);
      });
      progressTrack.addEventListener("pointerup", () => { isScrubbing = false; });

      progressTrack.addEventListener("keydown", (e) => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        const step = Math.max(1, audio.duration * 0.02);
        if (e.key === "ArrowLeft")       { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - step); }
        else if (e.key === "ArrowRight") { e.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + step); }
        else if (e.key === "Home")       { e.preventDefault(); audio.currentTime = 0; }
        else if (e.key === "End")        { e.preventDefault(); audio.currentTime = audio.duration; }
        updateProgressUI();
      });

      audio.addEventListener("loadedmetadata", updateProgressUI);
      audio.addEventListener("timeupdate",     updateProgressUI);
      audio.addEventListener("play",           () => updatePlayState(true));
      audio.addEventListener("pause",          () => updatePlayState(false));
      audio.addEventListener("ended",          () => advanceToNext());


      document.addEventListener("keydown", (e) => {
        const inInput = e.target.closest("input, textarea, select, [contenteditable], button, a");
        if (inInput) return;
        if (e.key === " ")                    { e.preventDefault(); togglePlayPause(); }
        else if (e.key.toLowerCase() === "s") { e.preventDefault(); setShuffling(!isShuffling); }
        else if (e.key.toLowerCase() === "t") { e.preventDefault(); setTracklistOpen(!tracklistOpen); }
        revealControls();
      });

      window.addEventListener("resize", refreshMarquee);
    }

    function initMediaSessionActions() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.setActionHandler("play",  playAudio);
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("previoustrack", () => {
        const idx = displayList.indexOf(activeTrack);
        if (idx > 0) selectTrack(displayList[idx - 1]);
      });
      navigator.mediaSession.setActionHandler("nexttrack", () => {
        const idx = displayList.indexOf(activeTrack);
        if (idx < displayList.length - 1) selectTrack(displayList[idx + 1]);
      });
      navigator.mediaSession.setActionHandler("seekbackward", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("seekforward", () => {
        if (!Number.isFinite(audio.duration)) return;
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        updateProgressUI();
      });
    }

    function init() {
      setScenePoster();
      initBoomerang();
      bindEvents();
      initMediaSessionActions();
      initMix(false);
      setTracklistOpen(false);
      setControlsVisible(true);
    }

    init();
  </script>
</body>
</html>
